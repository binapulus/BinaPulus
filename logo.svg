<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#00796B"/>
    </linearGradient>
    <linearGradient id="binaOn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="binaYan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="binaUst" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#222222"/>
    </linearGradient>
    <linearGradient id="camGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#004D40;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="zeminGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00C853;stop-opacity:0"/>
    </linearGradient>

    <!-- ALTIN gradient — "Bina" yazısı -->
    <linearGradient id="altinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="40%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <!-- ALTIN parlama — üst ışık -->
    <linearGradient id="altinParla" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF176"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#F9A825"/>
    </linearGradient>

    <!-- Plus yeşil gradient -->
    <linearGradient id="textPlus" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#00E676"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,200,83,0.25)"/>
    </filter>
    <filter id="altinGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(255,215,0,0.4)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Arka plan ikon kutu -->
  <rect x="6" y="6" width="128" height="128" rx="24" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Zemin yansıma -->
  <ellipse cx="70" cy="122" rx="45" ry="8" fill="url(#zeminGrad)"/>

  <!-- ══ 3D BİNA ANA ══ -->
  <polygon points="90,28 110,40 110,108 90,96" fill="url(#binaYan)"/>
  <polygon points="40,40 90,28 90,96 40,108" fill="url(#binaOn)"/>
  <polygon points="40,40 90,28 110,40 60,52" fill="url(#binaUst)"/>

  <!-- Ön pencereler -->
  <rect x="46" y="50" width="10" height="8" rx="1" fill="url(#camGrad)" filter="url(#glow)"/>
  <rect x="60" y="47" width="10" height="8" rx="1" fill="url(#camGrad)" filter="url(#glow)"/>
  <rect x="74" y="44" width="10" height="8" rx="1" fill="url(#camGrad)" opacity="0.5"/>
  <rect x="46" y="63" width="10" height="8" rx="1" fill="url(#camGrad)" opacity="0.5"/>
  <rect x="60" y="60" width="10" height="8" rx="1" fill="url(#camGrad)" filter="url(#glow)"/>
  <rect x="74" y="57" width="10" height="8" rx="1" fill="url(#camGrad)" opacity="0.7"/>
  <rect x="46" y="76" width="10" height="8" rx="1" fill="url(#camGrad)" filter="url(#glow)"/>
  <rect x="60" y="73" width="10" height="8" rx="1" fill="url(#camGrad)" opacity="0.4"/>
  <rect x="74" y="70" width="10" height="8" rx="1" fill="url(#camGrad)" filter="url(#glow)"/>
  <rect x="46" y="89" width="10" height="8" rx="1" fill="url(#camGrad)" opacity="0.6"/>
  <rect x="60" y="86" width="10" height="8" rx="1" fill="url(#camGrad)" filter="url(#glow)"/>
  <rect x="74" y="83" width="10" height="8" rx="1" fill="url(#camGrad)" opacity="0.5"/>

  <!-- Yan pencereler -->
  <rect x="93" y="48" width="13" height="7" rx="1" fill="url(#camGrad)" opacity="0.4"/>
  <rect x="93" y="60" width="13" height="7" rx="1" fill="url(#camGrad)" opacity="0.6"/>
  <rect x="93" y="72" width="13" height="7" rx="1" fill="url(#camGrad)" opacity="0.3"/>
  <rect x="93" y="84" width="13" height="7" rx="1" fill="url(#camGrad)" opacity="0.5"/>

  <!-- Kenar çizgileri -->
  <line x1="40" y1="40" x2="40" y2="108" stroke="rgba(0,200,83,0.15)" stroke-width="1"/>
  <line x1="90" y1="28" x2="90" y2="96" stroke="rgba(0,200,83,0.2)" stroke-width="1"/>
  <line x1="110" y1="40" x2="110" y2="108" stroke="rgba(0,200,83,0.1)" stroke-width="1"/>

  <!-- ══ KÜÇÜK BİNA SOL ══ -->
  <polygon points="18,62 30,56 30,108 18,114" fill="rgba(20,20,20,0.9)"/>
  <polygon points="10,66 18,62 18,114 10,118" fill="rgba(30,30,30,0.8)"/>
  <polygon points="10,66 18,62 30,56 22,60" fill="rgba(50,50,50,0.8)"/>
  <rect x="11" y="70" width="5" height="4" rx="0.5" fill="url(#camGrad)" opacity="0.5"/>
  <rect x="11" y="78" width="5" height="4" rx="0.5" fill="url(#camGrad)" filter="url(#glow)"/>
  <rect x="11" y="86" width="5" height="4" rx="0.5" fill="url(#camGrad)" opacity="0.3"/>
  <rect x="20" y="66" width="7" height="4" rx="0.5" fill="url(#camGrad)" opacity="0.4"/>
  <rect x="20" y="74" width="7" height="4" rx="0.5" fill="url(#camGrad)" opacity="0.6"/>
  <rect x="20" y="82" width="7" height="4" rx="0.5" fill="url(#camGrad)" opacity="0.3"/>

  <!-- Zemin çizgisi -->
  <line x1="10" y1="118" x2="110" y2="108" stroke="rgba(0,200,83,0.3)" stroke-width="1.5"/>

  <!-- Plus ikonu -->
  <circle cx="116" cy="22" r="14" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <rect x="109" y="19" width="14" height="5" rx="2.5" fill="white"/>
  <rect x="113" y="15" width="5" height="14" rx="2.5" fill="white"/>

  <!-- ── METİN ── -->
  <!-- "Bina" ALTIN -->
  <text x="152" y="76"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="52"
        font-weight="900"
        fill="url(#altinParla)"
        filter="url(#altinGlow)"
        letter-spacing="-2">Bina</text>

  <!-- "Plus" YEŞİL -->
  <text x="268" y="76"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="52"
        font-weight="900"
        fill="url(#textPlus)"
        letter-spacing="-2">Plus</text>

  <!-- Alt yazı — altın tonu -->
  <text x="152" y="100"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="12"
        font-weight="600"
        fill="#8a7240"
        letter-spacing="3">APARTMAN YÖNETİM SİSTEMİ</text>
</svg>
