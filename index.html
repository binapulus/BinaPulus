<script>
// ── VERİ ─────────────────────────────────────────
const AY=['Oca','\u015eub','Mar','Nis','May','Haz','Tem','A\u011fu','Eyl','Eki','Kas','Ara'];
const AYF=['Ocak','\u015eubat','Mart','Nisan','May\u0131s','Haziran','Temmuz','A\u011fustos','Eyl\u00fcl','Ekim','Kas\u0131m','Aral\u0131k'];
const fP=n=>new Intl.NumberFormat('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:2}).format(n||0)+'\u20ba';
const fT=d=>d?new Date(d).toLocaleDateString('tr-TR'):'-';
const bugun=()=>new Date().toISOString().split('T')[0];
const uid=()=>'_'+Math.random().toString(36).slice(2,9);
// ── SHA-256 (şifreler düz metin saklanmaz) ──
function sha256(ascii){
  function rr(v,a){return(v>>>a)|(v<<(32-a));}
  var mP=Math.pow,mW=mP(2,32),result='';
  var words=[],aBL=ascii.length*8;
  var hash=sha256.h=sha256.h||[],k=sha256.k=sha256.k||[],pC=k.length;
  var isC={};
  for(var cand=2;pC<64;cand++){
    if(!isC[cand]){
      for(var i=0;i<313;i+=cand)isC[i]=cand;
      hash[pC]=(mP(cand,.5)*mW)|0;
      k[pC++]=(mP(cand,1/3)*mW)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){
    var j=ascii.charCodeAt(i);
    if(j>>8)return'';
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=(aBL/mW)|0;words[words.length]=aBL;
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16),oldH=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2];
      var a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);
      hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++)hash[i]=(hash[i]+oldH[i])|0;
  }
  for(i=0;i<8;i++){
    for(j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}
function sifreHash(s){try{var h=sha256(unescape(encodeURIComponent(String(s||''))));return h||String(s||'');}catch(e){return String(s||'');}}
function sifreKontrol(girilen,kayitli){
  if(!kayitli)return false;
  if(/^[a-f0-9]{64}$/.test(kayitli))return sifreHash(girilen)===kayitli;
  return girilen===kayitli; // eski düz metin kayıtlarla uyumluluk
}
function sifreMigrasyon(){
  try{
    var hd=function(p){return(p&&!/^[a-f0-9]{64}$/.test(p))?sifreHash(p):p;};
    if(D.admin&&D.admin.password)D.admin.password=hd(D.admin.password);
    (D.yoneticiler||[]).forEach(function(y){if(y.password)y.password=hd(y.password);});
    Object.keys(D.daireler||{}).forEach(function(b){
      (D.daireler[b]||[]).forEach(function(d){if(d.sakinSifre)d.sakinSifre=hd(d.sakinSifre);});
    });
  }catch(e){}
}

function kasaBilgi(bid){

}
function aidatBorcu(bid){
  var dl=D.daireler[bid]||[];

  var t=0;
  dl.filter(function(d){return!d.muaf;}).forEach(function(d){

function timerB(bitis,askida){
  if(askida)return{cls:'tsu',ic:'\uD83D\uDD12',lbl:'Ask\u0131da'};
  if(!bitis)return{cls:'tok',ic:'\u2705',lbl:'S\u00fcresiz'};
  var g=Math.ceil((new Date(bitis)-new Date())/864e5);
  if(g<=0)return{cls:'tex',ic:'\u274C',lbl:'Doldu'};
  if(g<=30)return{cls:'twn',ic:'\u26A0\uFE0F',lbl:g+' g\u00fcn'};
  return{cls:'tok',ic:'\u2705',lbl:g+' g\u00fcn'};
}
function pYaz(t){
  var b=['','Bir','\u0130ki','\u00dc\u00e7','D\u00f6rt','Be\u015f','Alt\u0131','Yedi','Sekiz','Dokuz'];
  var o=['','On','Yirmi','Otuz','K\u0131rk','Elli','Altm\u0131\u015f','Yetmi\u015f','Seksen','Doksan'];
  function gY(n){var s='';if(n>=100){s+=b[Math.floor(n/100)]+'Y\u00fcz';n=n%100;}if(n>=10){s+=o[Math.floor(n/10)];n=n%10;}if(n>0)s+=b[n];return s;}
  if(!t||t===0)return'S\u0131f\u0131r T\u00fcrk Liras\u0131';
  var s=Math.floor(t),r='';
  if(s>=1000){var x=Math.floor(s/1000);r+=(x===1?'Bir':gY(x))+'Bin';s=s%1000;}
  return r+gY(s)+' T\u00fcrk Liras\u0131';
}
function mNo(){return'MKB-'+Math.floor(100000+Math.random()*900000);}
function binaKisalt(binaAd){
  // İlk 3 harfi al, büyük yap, Türkçe karakterleri dönüştür
  var temiz=binaAd.toUpperCase()
    .replace(/\u00c7/g,'C').replace(/\u011e/g,'G').replace(/\u0130/g,'I')
    .replace(/\u00d6/g,'O').replace(/\u015e/g,'S').replace(/\u00dc/g,'U')
    .replace(/[^A-Z0-9]/g,'');
  return temiz.substring(0,3)||'BNA';
}
function daireKA(binaAd,daireNo){
  return binaKisalt(binaAd)+'_'+daireNo.toUpperCase().replace(/\s/g,'_');
}
function abonelikBilgi(y){
  if(!y)return{tip:'demo',etiket:'Demo',renk:'#f59e0b',bitti:false};
  if(y.abonelik==='tam'){
    if(!y.abonelikBitis)return{tip:'tam',etiket:'Tam S\u00fcr\u00fcm',renk:'var(--g1)',bitti:false};
    var g=Math.ceil((new Date(y.abonelikBitis)-new Date())/864e5);
    if(g<=0)return{tip:'bitti',etiket:'S\u00fcresi Doldu',renk:'var(--red)',bitti:true};
    return{tip:'tam',etiket:'Tam S\u00fcr\u00fcm'+(g<=7?' ('+g+' g\u00fcn)':''),renk:'var(--g1)',bitti:false};
  }
  if(y.abonelikBaslangic){
    var gecen=Math.ceil((new Date()-new Date(y.abonelikBaslangic))/864e5);
    var kalan=30-gecen;
    if(kalan<=0)return{tip:'bitti',etiket:'Demo Bitti',renk:'var(--red)',bitti:true};
    return{tip:'demo',etiket:'Demo ('+kalan+' g\u00fcn)',renk:'#f59e0b',bitti:false};
  }
  return{tip:'demo',etiket:'Demo S\u00fcr\u00fcm',renk:'#f59e0b',bitti:false};
}

var kaydet=function(){
  window._sonKayitZaman=Date.now();
  try{localStorage.setItem('bp5',JSON.stringify(D));}catch(e){}
  // KORUMA: Buluttan ilk okuma yapılmadan Firestore'a ASLA yazma
  // (Aksi halde demo/INIT verisi gerçek veriyi ezebilir)
  if(!window._bulutOkundu){console.warn('Bulut hen\u00fcz okunmad\u0131, yaz\u0131m atland\u0131');return;}
  if(window.db){
    try{
      // Resimleri çıkar - Firestore 1MB limit aşılmasın
      var D2=JSON.parse(JSON.stringify(D));
      // Dekontlardaki resimleri temizle
      Object.keys(D2.dekontlar||{}).forEach(function(bid){
        (D2.dekontlar[bid]||[]).forEach(function(d){if(d.resim&&d.resim.length>200000)d.resim='[resim_local]';});
      });
      // Arızalardaki resimleri temizle
      Object.keys(D2.arizalar||{}).forEach(function(bid){
        (D2.arizalar[bid]||[]).forEach(function(a){if(a.resim&&a.resim.length>200000)a.resim='[resim_local]';});
      });
      // Gizli imza JSON içine gömülür - saldırgan değiştiremez
      D2._imza=sifreHash('BinaPlus'+new Date().toISOString().slice(0,10)+'gizli_2026_bp').slice(0,16);
      var jsonStr=JSON.stringify(D2);
      var boyut=new Blob([jsonStr]).size;
      console.log('Firestore veri boyutu:',Math.round(boyut/1024),'KB');
      if(boyut>900000){
        console.warn('Veri cok buyuk, Firestore kayit atlanıyor:',boyut);
        return;
      }
      window._yaziyorum=true;
      window.db.collection('binaplus').doc('data').set({
        json:jsonStr,
        guncelleme:new Date().toISOString()
      }).then(function(){
        console.log('Firestore kayit OK!',Math.round(boyut/1024)+'KB');
        setTimeout(function(){window._yaziyorum=false;},2000);
      }).catch(function(e){
        window._yaziyorum=false;
        console.error('Firestore KAYIT HATASI:',e.code,e.message);
      });
    }catch(e){console.warn('Firestore hata:',e);}
  }
};

  if(!toEmail){console.warn('Mail adresi bos');return Promise.resolve(false);}
  return await emailjs.send(window.EMAILJS_SERVICE,window.EMAILJS_TEMPLATE,{
    to_email:toEmail,
    alici:alici||'Kullan\u0131c\u0131',
    baslik:baslik||'BinaPlus',
    mesaj:mesaj||'',
    mesaj_html:mesaj||'',
    bina:bina||'',
    tarih:new Date().toLocaleDateString('tr-TR')
  }).then(function(r){
    console.log('Mail gonderildi:',toEmail,r.status);
    return true;
  }).catch(function(e){
    var det=(e&&e.text)?e.text:(e&&e.message)?e.message:String(e);
    console.error('MAIL HATASI ('+toEmail+'):',det);
    toast('\u26A0\uFE0F Mail g\u00f6nderilemedi: '+det.substring(0,80),'err');
    return false;
  });
}

// kaydet ve guncelle yukarıda tanımlı

// Firestore'dan veri yükle
async function firestoreYukle(){
  if(!window.db||!window.fbStore)return false;
  try{
    const ref=window.db.collection('binaplus').doc('data');
    const snap=await ref.get();
    if(snap&&snap.exists){
      const data=snap.data();
      if(data&&data.json){
          const uzak=JSON.parse(data.json);
          // İmza kontrolü - JSON içindeki gizli imzayı kontrol et
          if(uzak._imza){
            var bugun=new Date().toISOString().slice(0,10);
            var dun=new Date(Date.now()-86400000).toISOString().slice(0,10);
            var evvelsi=new Date(Date.now()-172800000).toISOString().slice(0,10);
            var gecerliImzalar=[
              sifreHash('BinaPlus'+bugun+'gizli_2026_bp').slice(0,16),
              sifreHash('BinaPlus'+dun+'gizli_2026_bp').slice(0,16),
              sifreHash('BinaPlus'+evvelsi+'gizli_2026_bp').slice(0,16)
            ];
            if(gecerliImzalar.indexOf(uzak._imza)<0){
              console.error('\u26A0\uFE0F UYARI: Veri manipule edilmis! Yukleme reddedildi.');
              // Yerel veriyi koru
              window._bulutOkundu=true;
              return false;
            }
          }
        const lokalStr=localStorage.getItem('bp5');
        if(!lokalStr){
          D=uzak;localStorage.setItem('bp5',JSON.stringify(D));
          console.log('Firestore yuklendi');return true;
        }
        try{
          const lokal=JSON.parse(lokalStr);
          if(uzak.guncelleme&&lokal.guncelleme&&uzak.guncelleme>lokal.guncelleme){
            D=uzak;localStorage.setItem('bp5',JSON.stringify(D));
            console.log('Firestore guncel');return true;
          }
        }catch(e2){}
      }
    }
  }catch(e){console.warn('Firestore okuma hatasi:',e);}
  window._bulutOkundu=true; // Hata olsa bile artık yazmak güvenli
  return false;
}

async function firestoreBaslat(){
  // Kısa süre bekle Firebase'in yüklenmesi için
  let deneme=0;
  while(!window.firebaseReady&&deneme<20){
    await new Promise(r=>setTimeout(r,200));
    deneme++;
  }
  if(!window.firebaseReady){
    console.warn('Firebase yüklenemedi, localStorage kullanılıyor');
    window._bulutOkundu=true; // Firebase yoksa local ile devam et
    render();
    return;
  }
  const yuklendi=await firestoreYukle();
  if(yuklendi){
    migrateData();
    if(typeof render==='function')render();
  }
  // Gerçek zamanlı dinleme - başka cihaz veri güncellerse otomatik yansısın
  if(window.db&&window.fbStore){
    window.db.collection('binaplus').doc('data').onSnapshot(function(snap){
      if(snap&&snap.exists&&(Date.now()-( window._sonKayitZaman||0))>3000){
        try{
          const sd=snap.data();
          if(sd&&sd.json){
            const uzak=JSON.parse(sd.json);
            D=uzak;migrateData();
            localStorage.setItem('bp5',JSON.stringify(D));
            if(typeof render==='function')render();
            console.log('Firestore guncelleme alindi');
          }
        }catch(e){console.warn('Snap hatasi:',e);}
      }
    });
  }
}
function migrateData(){
  var oncekiAdmin=D.admin&&D.admin.password;
  sifreMigrasyon();
  // Şifre hash'lendiyse hemen kaydet
  if(oncekiAdmin&&D.admin&&D.admin.password!==oncekiAdmin){
    console.log('Sifreler hashlendi, kaydediliyor...');
    setTimeout(function(){kaydet();},1000);
  }
  if(!D.copKutusu)D.copKutusu=[];
  if(!D.abonelikGelir)D.abonelikGelir=[];
  // 30 günden eski çöpleri boşalt
  var cSinir=Date.now()-30*24*60*60*1000;
  D.copKutusu=D.copKutusu.filter(function(c){try{return new Date(c.tarih).getTime()>cSinir;}catch(e){return false;}});
  if(!D.kasaH&&D.kasaHareketleri){D.kasaH=D.kasaHareketleri;}
  if(!D.kasaH)D.kasaH={};
  D.binalar.forEach(function(b){
    if(!D.daireler[b.id]||D.daireler[b.id].length===0){
      var mkisalt=binaKisalt(b.ad);
      var mdaireler=[];
      var mevcutKAlar=[];
      for(var mi=1;mi<=15;mi++){
        var mdaireNo='D'+mi;
        var mka=mkisalt+'_'+mdaireNo;
        // Çakışma varsa farklı KA oluştur
        var mkaf=mka;var msc=2;
        while(mevcutKAlar.indexOf(mkaf)>=0){mkaf=mka+'_'+msc;msc++;}
        mevcutKAlar.push(mkaf);
        mdaireler.push({id:uid(),no:mdaireNo,kat:Math.ceil(mi/3)-1,sakin:'',tip:'M\u00fclk Sahibi',aidat:b.aylikAidat||500,muaf:false,sakinKA:mkaf,sakinSifre:sifreHash('123456')});
      }
      D.daireler[b.id]=mdaireler;
    }
    if(!D.aidatlar[b.id])D.aidatlar[b.id]={};
    if(!D.kasaH[b.id])D.kasaH[b.id]=[];
    if(!D.faturalar[b.id])D.faturalar[b.id]=[];
    if(!D.kampanyalar[b.id])D.kampanyalar[b.id]=[];
    if(!D.evraklar[b.id])D.evraklar[b.id]=[];
    if(!D.duyurular)D.duyurular={};
    if(!D.duyurular[b.id])D.duyurular[b.id]=[];
    if(!D.arizalar)D.arizalar={};
    if(!D.arizalar[b.id])D.arizalar[b.id]=[];
    if(!D.dekontlar)D.dekontlar={};
    if(!D.dekontlar[b.id])D.dekontlar[b.id]=[];
    if(!D.ayarlar)D.ayarlar={};
    if(!D.ayarlar[b.id])D.ayarlar[b.id]={kasaBas:0};
  });
  D.yoneticiler.forEach(function(y){
    if(!y.gSoru)y.gSoru='';
    if(!y.gCevap)y.gCevap='';
    if(y.onaylandi===undefined)y.onaylandi=true;
    if(!y.kullaniciAdi)y.kullaniciAdi=y.email?y.email.split('@')[0]:'';
    if(!y.abonelik)y.abonelik='demo';
    if(y.abonelikBitis===undefined)y.abonelikBitis='';
  });
  Object.keys(D.daireler).forEach(function(bid){
    (D.daireler[bid]||[]).forEach(function(d){
      if(!d.sakinKA)d.sakinKA='';
      if(!d.sakinSifre)d.sakinSifre='';
    });
  });
  if(!D.basvurular)D.basvurular=[];
}

function modalSifremiUnuttum(){
  modal('\uD83D\uDD13 \u015eifremi Unuttum',function(m,close){
    m.appendChild(alrt('al-info','Kullan\u0131c\u0131 ad\u0131n\u0131z\u0131 veya kay\u0131tl\u0131 e-posta adresinizi girin. Ge\u00e7ici \u015fifre e-postan\u0131za g\u00f6nderilecek.'));
    const eI=inp('text','','Kullan\u0131c\u0131 ad\u0131 veya e-posta');
    const errD=dv('');
    append(m,fg('KULLANICI ADI / E-POSTA',eI),errD);
    const brow=dv('brow');
    brow.appendChild(btn('btn bgr','\u0130ptal',close));
    brow.appendChild(btn('btn bg','\uD83D\uDCE7 Ge\u00e7ici \u015eifre G\u00f6nder',function(){
      errD.innerHTML='';
      const email=eI.value.trim();
      if(!email){errD.appendChild(alrt('al-err','Bilgi girin.'));return;}
      // Admin mi?
      var hedefMail='',uygula=null,kim='';
      if((email===D.admin.email||email===D.admin.kullaniciAdi)){
        hedefMail=D.admin.email||'';
        kim=D.admin.name||'Admin';
        uygula=function(gs){D.admin.password=sifreHash(gs);};
      }
      // Yönetici mi?
      var y=D.yoneticiler.find(function(x){return x.kullaniciAdi===email||x.email===email;});
      if(!uygula&&y){
        hedefMail=y.email||'';kim=y.ad||y.kullaniciAdi;
        uygula=function(gs){var i=D.yoneticiler.findIndex(function(x){return x.id===y.id;});if(i>=0)D.yoneticiler[i].password=sifreHash(gs);};
      } else {
        // Sakin mi?
        var bulunan=null,bulBid=null;
        Object.keys(D.daireler||{}).forEach(function(bid){
          var d=(D.daireler[bid]||[]).find(function(x){return x.sakinKA===email||x.sakinEmail===email;});
          if(d){bulunan=d;bulBid=bid;}
        });
        if(bulunan){
          hedefMail=bulunan.sakinEmail||'';kim=bulunan.sakin||bulunan.sakinKA;
          uygula=function(gs){
            var i=D.daireler[bulBid].findIndex(function(x){return x.id===bulunan.id;});
            if(i>=0)D.daireler[bulBid][i].sakinSifre=sifreHash(gs);
          };
        }
      }
      if(!uygula){errD.appendChild(alrt('al-err','\u26A0\uFE0F Kullan\u0131c\u0131 bulunamad\u0131.'));return;}
      if(!hedefMail){
        errD.appendChild(alrt('al-warn','\u26A0\uFE0F Hesab\u0131n\u0131zda kay\u0131tl\u0131 e-posta yok. Y\u00f6neticinizle ileti\u015fime ge\u00e7in; \u015fifrenizi o s\u0131f\u0131rlayabilir.'));
        return;
      }
      // Geçici şifre üret: 8 haneli
      var gs='';var kr='ABCDEFGHJKLMNPRSTUVYZ23456789';
      for(var i=0;i<8;i++)gs+=kr[Math.floor(Math.random()*kr.length)];
      errD.appendChild(alrt('al-info','\uD83D\uDD04 G\u00f6nderiliyor...'));
      mailGonder(hedefMail,kim,
        '\uD83D\uDD10 BinaPlus Ge\u00e7ici \u015eifre',
        'Say\u0131n '+kim+',\n\nGe\u00e7ici \u015fifreniz: '+gs+'\n\nBu \u015fifreyle giri\u015f yap\u0131p Ayarlar sayfas\u0131ndan yeni \u015fifrenizi belirleyin.\n\nBu talebi siz yapmad\u0131ysan\u0131z y\u00f6neticinize bildirin.',
        'BinaPlus'
      ).then(function(ok){
        errD.innerHTML='';
        if(ok){
          guncelle(function(){uygula(gs);},'Ge\u00e7ici \u015fifre g\u00f6nderildi: '+kim);
          errD.appendChild(alrt('al-ok','\u2705 Ge\u00e7ici \u015fifre '+hedefMail+' adresine g\u00f6nderildi! Spam klas\u00f6r\u00fcn\u00fc de kontrol edin.'));
        } else {
          errD.appendChild(alrt('al-err','\u26A0\uFE0F Mail g\u00f6nderilemedi, \u015fifre DE\u011e\u0130\u015eT\u0130R\u0130LMED\u0130. Tekrar deneyin.'));
        }
      });
    }));
    m.appendChild(brow);
  });
}

  [['aylik','Aylık'],['yillik','Yıllık'],['tek','Tek Seferlik']].forEach(function(p){
    var o=document.createElement('option');o.value=p[0];o.textContent=p[1];o.style.background='#1a5c38';periyotSel.appendChild(o);
  });
  var basTarI=darkInp2('date',bugun(),'');
  var bitTarI=darkInp2('date','','');
  // Bitiş tarihi otomatik hesapla
  basTarI.onchange=function(){
    if(periyotSel.value==='aylik'){
      var d=new Date(basTarI.value);d.setMonth(d.getMonth()+1);
      bitTarI.value=d.toISOString().slice(0,10);
    } else if(periyotSel.value==='yillik'){
      var d2=new Date(basTarI.value);d2.setFullYear(d2.getFullYear()+1);
      bitTarI.value=d2.toISOString().slice(0,10);
    }
  };
  periyotSel.onchange=function(){basTarI.onchange();};

  var notI2=darkInp2('text','','Ödeme notu (isteğe bağlı)');
  var errD2=dv('');

  var row1=dv('');row1.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px';
  var basL=dv('');basL.appendChild(darkLabel2('BAŞLANGIÇ TAR.'));basL.appendChild(basTarI);
  var bitL=dv('');bitL.appendChild(darkLabel2('BİTİŞ TAR.'));bitL.appendChild(bitTarI);
  row1.appendChild(basL);row1.appendChild(bitL);

  var row2=dv('');row2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px';
  var tutL=dv('');tutL.appendChild(darkLabel2('TUTAR (₺)'));tutL.appendChild(tutarI2);
  var perL=dv('');perL.appendChild(darkLabel2('PERİYOT'));perL.appendChild(periyotSel);
  row2.appendChild(tutL);row2.appendChild(perL);

  ekleCard.appendChild(darkFg2('BİNA',binaSel2,10));
  ekleCard.appendChild(row2);
  ekleCard.appendChild(row1);
  ekleCard.appendChild(darkFg2('NOT',notI2,10));
  ekleCard.appendChild(errD2);

  var ekleBtn=document.createElement('button');
  ekleBtn.textContent='\uD83D\uDCB0 Gelir Kaydı Ekle';
  ekleBtn.style.cssText='width:100%;padding:12px;background:#f0c040;color:#1a3a1a;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer';
  ekleBtn.onclick=function(){
    errD2.innerHTML='';
    if(!binaSel2.value){errD2.appendChild(alrt('al-err','Bina seçin.'));return;}
    if(!tutarI2.value||+tutarI2.value<=0){errD2.appendChild(alrt('al-err','Tutar girin.'));return;}
    if(!basTarI.value){errD2.appendChild(alrt('al-err','Tarih girin.'));return;}
    var bina2=D.binalar.find(function(b){return b.id===binaSel2.value;});
    guncelle(function(){
      D.abonelikGelir.push({
        id:uid(),binaId:binaSel2.value,binaAd:bina2?bina2.ad:'',
        tutar:+tutarI2.value,periyot:periyotSel.value,
        basTarih:basTarI.value,bitTarih:bitTarI.value,
        not:notI2.value.trim(),kayitTarih:bugun(),yil:+basTarI.value.slice(0,4)
      });
    },'Abonelik geliri eklendi: '+(bina2?bina2.ad:'')+' '+fP(+tutarI2.value));
    binaSel2.value='';tutarI2.value='';notI2.value='';
    toast('\u2705 Gelir kayd\u0131 eklendi!','ok');
  };
  ekleCard.appendChild(ekleBtn);
  wrap.appendChild(ekleCard);

  // ── YIL ÖZETİ ──
  var yilGelirler=D.abonelikGelir.filter(function(g){return g.yil===secilenYil||+g.basTarih.slice(0,4)===secilenYil;});
  var toplamYil=yilGelirler.reduce(function(s,g){return s+g.tutar;},0);
  var aylik=yilGelirler.filter(function(g){return g.periyot==='aylik';}).reduce(function(s,g){return s+g.tutar;},0);
  var yillik=yilGelirler.filter(function(g){return g.periyot==='yillik';}).reduce(function(s,g){return s+g.tutar;},0);
  var tek=yilGelirler.filter(function(g){return g.periyot==='tek';}).reduce(function(s,g){return s+g.tutar;},0);

  var ozet2=dv('');ozet2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px';
  [[fP(toplamYil),secilenYil+' YILI TOPLAM','#e8f5e9','#2e7d32'],
   [fP(aylik),'AYLIK ABONELİK','#f0f4ff','#2c5fd4'],
   [fP(yillik),'YILLIK ABONELİK','#fff8e1','#92700a'],
   [fP(tek),'TEK SEFERLİK','#f3f0ff','#6b21a8']
  ].forEach(function(item){
    var k=dv('');k.style.cssText='background:'+item[2]+';border-radius:12px;padding:14px;text-align:center';
    k.innerHTML='<div style="font-size:17px;font-weight:900;color:'+item[3]+'">'+item[0]+'</div>'
      +'<div style="font-size:10px;font-weight:700;color:'+item[3]+';opacity:.7;margin-top:4px">'+item[1]+'</div>';
    ozet2.appendChild(k);
  });
  wrap.appendChild(ozet2);

  // Beyanname butonu
  var beyanBtn=btn('btn bg','\uD83D\uDCCB '+secilenYil+' Beyanname Raporu (PDF)',function(){
    adminGelirPDF(secilenYil,yilGelirler,toplamYil);
  });
  beyanBtn.style.cssText='width:100%;margin-bottom:16px;padding:12px;font-size:13px;font-weight:700';
  wrap.appendChild(beyanBtn);

  // ── KAYIT LİSTESİ ──
  var listT=dv('stit',secilenYil+' Y\u0131l\u0131 Gelir Kay\u0131tlar\u0131');
  wrap.appendChild(listT);

  if(!yilGelirler.length){
    wrap.appendChild(dv('al al-info',secilenYil+' y\u0131l\u0131na ait kay\u0131t yok.'));
  } else {
    yilGelirler.slice().reverse().forEach(function(g){
      var kart=dv('card');kart.style.cssText='margin-bottom:8px;padding:12px 14px;border-left:4px solid #1a5c38';
      kart.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<div><div style="font-weight:800;font-size:14px">\uD83C\uDFE2 '+g.binaAd+'</div>'
        +'<div style="font-size:11px;color:var(--text2);margin-top:3px">'
        +(g.periyot==='aylik'?'\uD83D\uDD04 Ayl\u0131k':g.periyot==='yillik'?'\uD83D\uDCC5 Y\u0131ll\u0131k':'\u23AA Tek Seferlik')
        +' \u00b7 '+fT(g.basTarih)+(g.bitTarih?' \u2014 '+fT(g.bitTarih):'')+' \u00b7 '+fT(g.kayitTarih)+'</div>'
        +(g.not?'<div style="font-size:11px;color:var(--text2);margin-top:2px">'+g.not+'</div>':'')+'</div>'
        +'<div style="text-align:right"><div style="font-size:16px;font-weight:900;color:#1a5c38">'+fP(g.tutar)+'</div>'
        +'<div style="font-size:10px;color:var(--text2)">'+g.yil+'</div></div></div>';
      var silBtn=btn('btn br bsm','\uD83D\uDDD1\uFE0F Sil',function(){
        if(confirm('Bu gelir kayd\u0131 silinsin mi?')){
          guncelle(function(){D.abonelikGelir=D.abonelikGelir.filter(function(x){return x.id!==g.id;});},'Gelir kayd\u0131 silindi');
          toast('Silindi','ok');
        }
      });
      silBtn.style.cssText='margin-top:8px;font-size:11px;padding:5px 10px';
      kart.appendChild(silBtn);
      wrap.appendChild(kart);
    });
  }
  return wrap;
}

function adminYedek(){
  const wrap=dv('');

  // ── BULUT YEDEKLERİ (günlük otomatik, 5 ay saklanır) ──
  const bc=dv('ss');bc.style.cssText='background:#f0f4ff;border:1.5px solid #c0cfff;border-radius:14px;padding:14px;margin-bottom:10px';
  bc.innerHTML='<div class="sst" style="color:#2c5fd4">\u2601\uFE0F G\u00fcnl\u00fck Bulut Yedekleri</div><p style="font-size:12px;color:#556;margin-bottom:10px">Her g\u00fcn otomatik al\u0131n\u0131r, 5 ay saklan\u0131r. Bir sorun olursa buradan geri d\u00f6nebilirsiniz.</p>';
  const yList=dv('');yList.appendChild(dv('al al-info','\uD83D\uDD04 Yedekler y\u00fckleniyor...'));
  bc.appendChild(yList);
  wrap.appendChild(bc);
  if(window.db){
    window.db.collection('yedekler').get().then(function(qs){
      yList.innerHTML='';
      var docs=[];
      qs.forEach(function(doc){docs.push(doc);});
      if(!docs.length){yList.appendChild(dv('al al-warn','Hen\u00fcz bulut yede\u011fi yok. \u0130lk yedek bug\u00fcn otomatik al\u0131nacak.'));return;}
      // Yeniden eskiye sırala
      docs.sort(function(a,b){return a.id<b.id?1:-1;});
      docs.forEach(function(doc){
        var tarihStr=doc.id.replace('yedek_','');
        var row=dv('');row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #dde';
        var lbl=dv('');lbl.style.cssText='font-size:13px;font-weight:700;color:#334';
        lbl.textContent='\uD83D\uDCC5 '+tarihStr;
        row.appendChild(lbl);
        var btns=dv('');btns.style.cssText='display:flex;gap:6px';
        var geriB=btn('btn bg bsm','\u21A9\uFE0F Geri Y\u00fckle',function(){
          // Önizleme: yedeğin içinde ne var?
          var onizle='';
          try{
            var pd=JSON.parse(doc.data().json);
            var dSay=Object.keys(pd.daireler||{}).reduce(function(s,k){return s+(pd.daireler[k]||[]).length;},0);
            var kSay=Object.keys(pd.kasaH||{}).reduce(function(s,k){return s+(pd.kasaH[k]||[]).length;},0);
            onizle='\n\n\uD83D\uDCE6 \u0130\u00e7erik: '+(pd.binalar||[]).length+' bina \u00b7 '+dSay+' daire \u00b7 '+(pd.yoneticiler||[]).length+' y\u00f6netici \u00b7 '+kSay+' kasa kayd\u0131';
          }catch(e){onizle='\n\n\u26A0\uFE0F Yedek i\u00e7eri\u011fi okunamad\u0131!';}
          if(confirm(tarihStr+' tarihli yedek geri y\u00fcklensin mi?'+onizle+'\n\nMevcut veriler bu yedekle DE\u011e\u0130\u015eT\u0130R\u0130LECEK!')){
            if(confirm('Emin misiniz? Bu i\u015flem geri al\u0131namaz!')){
              try{
                var yd=doc.data();
                if(yd&&yd.json){
                  D=JSON.parse(yd.json);
                  migrateData();
                  localStorage.setItem('bp5',JSON.stringify(D));
                  window._bulutOkundu=true;
                  kaydet();
                  render();
                  toast('\u2705 '+tarihStr+' yede\u011fi geri y\u00fcklendi!','ok');
                }
              }catch(e){alert('Yedek okunamad\u0131: '+e.message);}
            }
          }
        });
        geriB.style.cssText='font-size:11px;padding:6px 10px';
        var indirB=btn('btn bgr bsm','\uD83D\uDCE5',function(){
          var yd=doc.data();
          if(yd&&yd.json){
            var a=document.createElement('a');
            a.href=URL.createObjectURL(new Blob([yd.json],{type:'application/json'}));
            a.download='binaplus_bulut_'+tarihStr+'.json';a.click();
          }
        });
        indirB.style.cssText='font-size:11px;padding:6px 10px';
        btns.appendChild(geriB);btns.appendChild(indirB);
        row.appendChild(btns);
        yList.appendChild(row);
      });
    }).catch(function(e){
      yList.innerHTML='';
      yList.appendChild(dv('al al-err','\u26A0\uFE0F Yedekler okunamad\u0131. Firestore kurallar\u0131nda "yedekler" koleksiyonuna izin verildi\u011finden emin olun.'));
    });
  } else {
    yList.innerHTML='';
    yList.appendChild(dv('al al-warn','\u26A0\uFE0F Bulut ba\u011flant\u0131s\u0131 yok.'));
  }

  // ── ÇÖP KUTUSU (silinen bina/daireler, 30 gün) ──
  const cc=dv('ss');cc.style.cssText='background:#fff7ed;border:1.5px solid #fed7aa;border-radius:14px;padding:14px;margin-bottom:10px';
  cc.innerHTML='<div class="sst" style="color:#c2410c">\uD83D\uDDD1\uFE0F \u00c7\u00f6p Kutusu</div><p style="font-size:12px;color:#9a3412;margin-bottom:10px">Silinen bina ve daireler 30 g\u00fcn burada saklan\u0131r, geri alabilirsiniz.</p>';
  var cops=D.copKutusu||[];
  if(!cops.length){cc.appendChild(dv('al al-info','\u00c7\u00f6p kutusu bo\u015f.'));}
  else{
    cops.forEach(function(c,ci){
      var row=dv('');row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #fed7aa';
      var lbl=dv('');lbl.style.cssText='font-size:13px';
      lbl.innerHTML='<b>'+(c.tip==='bina'?'\uD83C\uDFE2':'\uD83C\uDFE0')+' '+(c.ad||'?')+'</b><div style="font-size:11px;color:#9a3412">'+fT(c.tarih)+' silindi</div>';
      row.appendChild(lbl);
      var geriAl=btn('btn bg bsm','\u21A9\uFE0F Geri Al',function(){
        if(!confirm((c.ad||'')+' geri al\u0131ns\u0131n m\u0131?'))return;
        guncelle(function(){
          if(c.tip==='bina'&&c.bina){
            D.binalar.push(c.bina);
            var p=c.paket||{};
            D.daireler[c.bina.id]=p.daireler||[];
            D.aidatlar[c.bina.id]=p.aidatlar||{};
            D.kasaH[c.bina.id]=p.kasaH||[];
            D.faturalar[c.bina.id]=p.faturalar||[];
            D.kampanyalar[c.bina.id]=p.kampanyalar||[];
            D.evraklar[c.bina.id]=p.evraklar||[];
            D.duyurular[c.bina.id]=p.duyurular||[];
            D.arizalar[c.bina.id]=p.arizalar||[];
            D.dekontlar[c.bina.id]=p.dekontlar||[];
            if(!D.ayarlar)D.ayarlar={};
            D.ayarlar[c.bina.id]=p.ayar||{kasaBas:0};
          } else if(c.tip==='daire'&&c.daire){
            if(!D.daireler[c.binaId])D.daireler[c.binaId]=[];
            D.daireler[c.binaId].push(c.daire);
            if(c.aidat){
              if(!D.aidatlar[c.binaId])D.aidatlar[c.binaId]={};
              D.aidatlar[c.binaId][c.daire.id]=c.aidat;
            }
          }
          D.copKutusu.splice(ci,1);
        },'Geri al\u0131nd\u0131: '+(c.ad||''));

function renderSakin(bina){
  if(!S.sakinSekme)S.sakinSekme='aidat';
  const wrap=dv('');wrap.style.cssText='height:100%;display:flex;flex-direction:column';
  const hdr=dv('hdr');
  const htop=dv('hdr-top');
  const hl=dv('');hl.innerHTML='<div class="bina-nm">\uD83C\uDFE0 '+S.user.no+'</div><div class="bina-ad">'+bina.ad+'</div>';
  const hr2=dv('hdr-date');
  const now=new Date();
  const dtDiv=dv('dt',now.getDate()+' '+AYF[now.getMonth()]+'<br>'+now.getFullYear());
  const exitB=btn('exit-b','\uD83D\uDEF4 \u00c7\u0131k\u0131\u015f',function(){S.user=null;render();});
  hr2.appendChild(dtDiv);hr2.appendChild(exitB);
  htop.appendChild(hl);htop.appendChild(hr2);
  hdr.appendChild(htop);
  // Borç özeti kartı
  const daire=D.daireler[bina.id].find(function(x){return x.id===S.user.id;})||S.user;
  const aidatlar=(D.aidatlar[bina.id]||{})[daire.id]||{};
  const yilNow=simdiYil(),ayNow=simdiAy();
  let borc=0,odenenSayi=0,toplamAy=0;
  Object.keys(aidatlar).forEach(function(yil){
    const yilNum=+yil;
    const maxAy=yilNum<yilNow?11:(yilNum===yilNow?ayNow:-1);
    for(let m=0;m<=maxAy;m++){
      toplamAy++;
      const p=aidatlar[yil][m];
      if(p&&(p.durum==='odendi'||p.durum==='erken'))odenenSayi++;
      else if(!daire.muaf)borc+=daire.aidat;
    }
  });
  const kc=dv('kasa-c');
  kc.innerHTML='<div class="kasa-lbl">\uD83D\uDCB0 A\u0130DAT DURUMU</div><div class="kasa-amt" style="color:'+(borc>0?'#ffb3a7':'#a0e4b8')+'">'+(daire.muaf?'MUAF':fP(borc))+'</div><div class="kasa-sub">'+(daire.muaf?'Aidat muafiyetiniz var':borc>0?'Toplam bor\u00e7 tutar\u0131':'Bor\u00e7 yok, tebrikler!')+'</div>';
  hdr.appendChild(kc);
  const tabs=dv('tabs');
  [{k:'aidat',i:'\uD83D\uDCC5',l:'Aidat Durumum'},{k:'kampanya',i:'\uD83C\uDFD7\uFE0F',l:'Kampanyalar'},{k:'dekont',i:'\uD83E\uDDFE',l:'Dekont Y\u00fckle'},{k:'ariza',i:'\uD83D\uDD27',l:'Ar\u0131za Bildir'},{k:'duyurular',i:'\uD83D\uDCE2',l:'Duyurular'},{k:'giderler',i:'\uD83D\uDCCB',l:'Bina Giderleri'},{k:'oylama',i:'\uD83D\uDDF3\uFE0F',l:'Oylama'},{k:'ayarlar',i:'\u2699\uFE0F',l:'Ayarlar'}].forEach(function(t){
    const tab=dv('tab'+(S.sakinSekme===t.k?' act':''),t.i+' '+t.l);
    tab.onclick=function(){S.sakinSekme=t.k;render();};
    tabs.appendChild(tab);
  });
  const cnt=dv('cnt');
  if(S.sakinSekme==='aidat')cnt.appendChild(renderSakinAidat(bina,daire));
  else if(S.sakinSekme==='kampanya')cnt.appendChild(renderSakinKampanya(bina,daire));
  else if(S.sakinSekme==='dekont')cnt.appendChild(renderSakinDekont(bina,daire));
  else if(S.sakinSekme==='ariza')cnt.appendChild(renderSakinAriza(bina,daire));
  else if(S.sakinSekme==='duyurular')cnt.appendChild(renderSakinDuyurular(bina));
  else if(S.sakinSekme==='giderler')cnt.appendChild(renderSakinGiderler(bina));
  else if(S.sakinSekme==='ayarlar')cnt.appendChild(renderSakinAyarlar(bina,daire));
  else if(S.sakinSekme==='oylama')cnt.appendChild(renderSakinOylama(bina,daire));
  const fab=el('button','fab','\uFF0B');
  fab.onclick=function(){
    if(S.sakinSekme==='dekont')modalDekontYukle(bina,daire);
    else if(S.sakinSekme==='ariza')modalArizaBildir(bina,daire);
  };
  if(S.sakinSekme==='dekont'||S.sakinSekme==='ariza')wrap.appendChild(fab);
  append(wrap,hdr,tabs,cnt);
  return wrap;
}
function renderSakinAidat(bina,daire){
  const wrap=dv('');
  const yc=dv('ay');
  const pb=btn('yn','\u2039',function(){S.yil--;render();});
  const nt=btn('yn','\u203a',function(){S.yil++;render();});
  const ym=dv('');ym.style.textAlign='center';ym.innerHTML='<div class="yt">'+S.yil+'</div><div class="ys">'+(S.yil===simdiYil()?'G\u00fcncel Y\u0131l':'')+'</div>';
  yc.appendChild(pb);yc.appendChild(ym);yc.appendChild(nt);
  wrap.appendChild(yc);
  if(daire.muaf){wrap.appendChild(alrt('al-ok','\u2705 Bu y\u0131l i\u00e7in aidat muafiyetiniz bulunmaktad\u0131r.'));return wrap;}
  const aidatlar=((D.aidatlar[bina.id]||{})[daire.id]||{})[S.yil]||{};
  const ayNow=simdiAy(),ylNow=simdiYil();
  const mg=dv('mg');mg.style.gridTemplateColumns='repeat(3,1fr)';
  AY.forEach(function(ay,mi){
    const p=aidatlar[mi];
    let cls='ft',ic='\u00b7',altyazi='';
    if(p&&p.durum==='odendi'){cls='ok';ic='\u2713';altyazi=fT(p.tarih);}

    const cell=dv('mc '+cls);cell.style.padding='12px 6px';
    cell.innerHTML='<div class="mi" style="font-size:16px">'+ic+'</div><div class="mn" style="font-size:11px">'+AYF[mi]+'</div>'+(altyazi?'<div style="font-size:9px;margin-top:3px;opacity:.8">'+altyazi+'</div>':'');
    // Ödenen aya tıklayınca makbuz göster/indir
    if(p&&(p.durum==='odendi'||p.durum==='erken')){
      cell.style.cursor='pointer';
      (function(pp,mmi){

        };
      })(p,mi);
    }
    mg.appendChild(cell);
  });
  wrap.appendChild(mg);
  return wrap;
}
function renderSakinKampanya(bina,daire){
  const wrap=dv('');
  wrap.appendChild(dv('stit','\uD83C\uDFD7\uFE0F Kampanya Durumum'));
  const kl=D.kampanyalar[bina.id]||[];
  const ilgili=kl.filter(function(k){
    return k.daireler.some(function(d){return d.daireId===daire.id;});
  });
  if(!ilgili.length){
    wrap.appendChild(dv('empty','<div class="ei">\uD83C\uDFD7\uFE0F</div><h3>Kat\u0131ld\u0131\u011f\u0131n\u0131z kampanya yok</h3>'));
    return wrap;
  }
  ilgili.forEach(function(k){
    const dKayitlar=k.daireler.filter(function(d){return d.daireId===daire.id;});
    const odenen=dKayitlar.filter(function(d){return d.odendi;}).length;
    const toplam=dKayitlar.length;
    const pct=toplam>0?Math.round(odenen/toplam*100):0;
    const toplamTutar=toplam*(k.daireBasiTutar||0);
    const odenenTutar=odenen*(k.daireBasiTutar||0);
    const kalanTutar=toplamTutar-odenenTutar;

    // Kampanya kartı - koyu yeşil (aidat gibi)
    const kc=dv('');kc.style.cssText='margin-bottom:14px;border-radius:16px;overflow:hidden;background:#1a5c38;color:#fff';

    // Başlık
    const kh=dv('');kh.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:12px 14px';
    kh.innerHTML='<div><b style="font-size:15px">\uD83C\uDFD7\uFE0F '+k.ad+'</b></div>'
      +(kalanTutar===0
        ?'<span style="color:#a0e4b8;font-weight:800;font-size:14px">\u2713 Tamam</span>'
        :'<span style="color:#ffb3a7;font-weight:800;font-size:15px">'+fP(kalanTutar)+'</span>');

    // Özet
    const ks=dv('');ks.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,.1);margin:0 10px;border-radius:10px;overflow:hidden';
    [[fP(k.daireBasiTutar||0),'KİŞİ BAŞI'],[odenen+'/'+toplam,'ÖDEME'],[fP(odenenTutar),'ÖDENDİ']].forEach(function(item){
      var s=dv('');s.style.cssText='padding:8px;text-align:center;background:rgba(0,0,0,.15)';
      s.innerHTML='<div style="font-size:13px;font-weight:900;color:#fff">'+item[0]+'</div><div style="font-size:9px;color:rgba(255,255,255,.6);margin-top:2px">'+item[1]+'</div>';
      ks.appendChild(s);
    });

    // İlerleme çubuğu
    const pb=dv('');pb.style.cssText='margin:8px 10px;background:rgba(255,255,255,.2);border-radius:10px;height:6px;overflow:hidden';
    const pbf=dv('');pbf.style.cssText='height:100%;background:#a0e4b8;border-radius:10px;width:'+pct+'%';
    pb.appendChild(pbf);

    // Ay kutuları - dKayitlar'ı ay sırasına göre göster
    const mg=dv('');mg.style.cssText='display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:8px 10px 12px';
    dKayitlar.forEach(function(dk,ai){
      var ayLabel=AYF[dk.ay]||('Ay '+(ai+1));
      var odendi=dk.odendi;
      var cell=dv('');
      cell.style.cssText='padding:8px 4px;border-radius:10px;text-align:center;background:'+(odendi?'rgba(0,200,100,.3)':'rgba(200,0,0,.25)');
      cell.innerHTML='<div style="font-size:14px;font-weight:800;color:'+(odendi?'#a0e4b8':'#ffb3a7')+'">'+(odendi?'\u2713':'\u2717')+'</div>'
        +'<div style="font-size:9px;color:'+(odendi?'#a0e4b8':'#ffb3a7')+';margin-top:2px">'+ayLabel+'</div>'
        +(dk.yil?'<div style="font-size:8px;color:rgba(255,255,255,.4)">'+dk.yil+'</div>':'');
      mg.appendChild(cell);
    });

    append(kc,kh,ks,pb,mg);
    wrap.appendChild(kc);
  });
  return wrap;
}

function renderSakinOylama(bina,daire){
  var wrap=dv('');

  }

  oylamalar.forEach(function(o){
    var bitis=new Date(o.bitisTarih+'T'+o.bitisSaat).getTime();
    var bitti=simdi>bitis;

    var evetSayi=Object.values(oylar).filter(function(x){return x.oy==='evet';}).length;

      +'<div style="color:rgba(255,255,255,.6);font-size:12px;margin-top:4px">'+bina.ad+'</div>';

function renderSakinGiderler(bina){

  else if(S.sekme==='oylama')cnt.appendChild(renderOylama(bina));
  else if(S.sekme==='duyurular')cnt.appendChild(renderDuyurular(bina));
  else if(S.sekme==='ekstra')cnt.appendChild(renderEkstra(bina));
  else if(S.sekme==='evraklar')cnt.appendChild(renderEvraklar(bina));

  else if(S.sekme==='ayarlar')cnt.appendChild(renderAyarlar(bina));

    else if(S.sekme==='duyurular')modalDuyuruEkle(bina);
    else if(S.sekme==='ekstra')modalKampanyaEkle(bina);
    else if(S.sekme==='oylama')modalOylamaEkle(bina);
    else if(S.sekme==='faturalar')modalFaturaEkle(bina);
    else if(S.sekme==='ekstra')cnt.scrollTo({top:0,behavior:'smooth'});

    else if(S.sekme==='aidat')modalDaireEkle(bina);
  });
  append(wrap,hdr,tabs,cnt,fab);
  return wrap;
}

function renderAidat(bina){
  if(!S.seciliDaireler)S.seciliDaireler={};
  const wrap=dv('');
  const yc=dv('ay');
  const pb=btn('yn','\u2039',function(){S.yil--;S.seciliDaireler={};render();});
  const nt=btn('yn','\u203a',function(){S.yil++;S.seciliDaireler={};render();});
  const ym=dv('');ym.style.textAlign='center';ym.innerHTML='<div class="yt">'+S.yil+'</div><div class="ys">'+(S.yil===simdiYil()?'G\u00fcncel Y\u0131l':'')+'</div>';
  yc.appendChild(pb);yc.appendChild(ym);yc.appendChild(nt);
  wrap.appendChild(yc);

  // Toplu işlem araç çubuğu
  const toolbar=dv('');toolbar.style.cssText='display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center';
  const secSayisi=Object.keys(S.seciliDaireler).filter(function(k){return S.seciliDaireler[k]&&S.seciliDaireler[k].length>0;}).length;
  if(secSayisi>0){
    const secInfo=dv('');secInfo.style.cssText='font-size:12px;color:var(--g1);font-weight:700';
    secInfo.textContent=secSayisi+' daire se\u00e7ili';
    toolbar.appendChild(secInfo);
    toolbar.appendChild(btn('btn bg bsm','\u2705 Toplu \u00d6dendi',function(){
      onayModal(secSayisi+' daire \u00f6dendi i\u015faretlensin mi?',function(){
        guncelle(function(){
          Object.keys(S.seciliDaireler).forEach(function(daireId){
            var aylar=S.seciliDaireler[daireId];
            if(!aylar||!aylar.length)return;
            var daire=(D.daireler[bina.id]||[]).find(function(x){return x.id===daireId;});
            if(!daire)return;
            if(!D.aidatlar[bina.id])D.aidatlar[bina.id]={};
            if(!D.aidatlar[bina.id][daireId])D.aidatlar[bina.id][daireId]={};
            if(!D.aidatlar[bina.id][daireId][S.yil])D.aidatlar[bina.id][daireId][S.yil]={};
            aylar.forEach(function(ay){
              D.aidatlar[bina.id][daireId][S.yil][ay]={durum:'odendi',tutar:daire.aidat,tarih:bugun()};
              if(!D.kasaH[bina.id])D.kasaH[bina.id]=[];
              D.kasaH[bina.id].push({id:uid(),tip:'gelir',tutar:daire.aidat,kategori:'Aidat Tahsilat\u0131',aciklama:daire.no+' '+AYF[ay]+' '+S.yil,tarih:bugun(),saat:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})});
            });
          });
        },'Toplu aidat: '+secSayisi+' daire');
        S.seciliDaireler={};toast('\u2705 Toplu \u00f6deme i\u015flendi','ok');
      });
    }));
    toolbar.appendChild(btn('btn bgr bsm','\uD83D\uDDBC\uFE0F Toplu Makbuz',function(){modalTopluMakbuz(bina,S.seciliDaireler,S.yil);}));
    toolbar.appendChild(btn('btn bgr bsm','\u2715 Temizle',function(){S.seciliDaireler={};render();}));
  }
  var aidatXls=btn('btn bgr bsm','\uD83D\uDCCA Excel',function(){
    var csv='\uFEFFDaire;Sakin';
    AYF.forEach(function(a){csv+=';'+a;});
    csv+=';Bor\u00e7\n';
    var ds=(D.daireler[bina.id]||[]).slice().sort(function(a,b){return(parseInt(a.no.replace(/[^0-9]/g,''))||0)-(parseInt(b.no.replace(/[^0-9]/g,''))||0);});
    var ylN=simdiYil(),ayN=simdiAy();
    ds.forEach(function(d){
      var ya=((D.aidatlar[bina.id]||{})[d.id]||{})[S.yil]||{};
      var borc=0;csv+=d.no+';'+(d.sakin||'');
      AYF.forEach(function(a,mi){
        var p=ya[mi];var od=p&&(p.durum==='odendi'||p.durum==='erken');
        var gecmis=S.yil<ylN||(S.yil===ylN&&mi<=ayN);
        if(d.muaf)csv+=';MUAF';
        else if(od)csv+=';\u00d6DEND\u0130';
        else if(gecmis){csv+=';BOR\u00c7';borc+=d.aidat;}
        else csv+=';-';
      });
      csv+=';'+borc+'\n';
    });
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.download=bina.ad.replace(/\s/g,'_')+'_aidat_'+S.yil+'.csv';a.click();
    toast('\uD83D\uDCCA Excel indirildi','ok');
  });
  toolbar.appendChild(aidatXls);
  wrap.appendChild(toolbar);

  const daireler=(D.daireler[bina.id]||[]).slice().sort(function(a,b){
    var na=parseInt(a.no.replace(/[^0-9]/g,''))||0;
    var nb=parseInt(b.no.replace(/[^0-9]/g,''))||0;
    return na-nb;
  });
  if(!daireler.length){wrap.appendChild(dv('empty','<div class="ei">\uD83C\uDFE0</div><h3>Daire yok</h3>'));return wrap;}

  daireler.forEach(function(d){
    const aidatlar=(D.aidatlar[bina.id]||{})[d.id]||{};
    const yilAidat=aidatlar[S.yil]||{};
    const ylNow=simdiYil(),ayNow=simdiAy();
    // Toplam borç hesapla
    var borc=0,odenenSayi=0,toplamGecmis=0;
    AY.forEach(function(ay,mi){
      if(S.yil>ylNow)return;
      if(S.yil===ylNow&&mi>ayNow)return;
      toplamGecmis++;
      if(!d.muaf){
        const p=yilAidat[mi];
        if(p&&(p.durum==='odendi'||p.durum==='erken'))odenenSayi++;
        else borc+=d.aidat;
      }
    });
    var tamam=!d.muaf&&borc===0&&toplamGecmis>0;

    // Koyu yeşil kart - eski tasarım gibi
    const adc=dv('');adc.style.cssText='margin-bottom:14px;border-radius:16px;overflow:hidden;background:#1a5c38;color:#fff';
    const adh=dv('');adh.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer';
    const secili=S.seciliDaireler[d.id]&&S.seciliDaireler[d.id].length>0;
    adh.innerHTML='<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,.5);background:'+(secili?'rgba(255,255,255,.3)':'transparent')+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px">'+(secili?'\u2713':'')+'</div>'
      +'<b style="font-size:16px">\uD83C\uDFE0 '+d.no+'</b>'
      +(d.sakin?'<span style="font-size:12px;opacity:.7"> \u2014 '+d.sakin+'</span>':'')
      +'</div>'
      +(d.muaf?'<span style="background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700">MUAF</span>'
        :tamam?'<span style="color:#a0e4b8;font-weight:800;font-size:14px">\u2713 Tamam</span>'
        :'<span style="color:#ffb3a7;font-weight:800;font-size:15px">'+fP(borc)+'</span>');
    adh.onclick=function(){modalDaireAySecim(bina,d,S.yil);};

    // Ay grid
    const mg=dv('');mg.style.cssText='display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:0 10px 12px';
    AY.forEach(function(ay,mi){
      const p=yilAidat[mi];
      const gecmis=S.yil<ylNow||(S.yil===ylNow&&mi<=ayNow);
      let bgColor='rgba(255,255,255,.1)',textColor='rgba(255,255,255,.4)',ic='\u00b7';
      if(d.muaf){bgColor='rgba(255,255,255,.15)';ic='M';textColor='rgba(255,255,255,.6)';}
      else if(p&&(p.durum==='odendi'||p.durum==='erken')){bgColor='rgba(0,200,100,.3)';textColor='#a0e4b8';ic='\u2713';}
      else if(gecmis){bgColor='rgba(200,0,0,.3)';textColor='#ffb3a7';ic='\u2717';}
      const cell=dv('');cell.style.cssText='padding:10px 4px;border-radius:10px;text-align:center;cursor:pointer;background:'+bgColor;
      cell.innerHTML='<div style="font-size:16px;font-weight:800;color:'+textColor+'">'+ic+'</div><div style="font-size:10px;color:'+textColor+';margin-top:3px">'+AYF[mi]+'</div>';
      cell.onclick=function(){modalAyOdeme(bina,d,mi,S.yil,p);};
      mg.appendChild(cell);
    });
    append(adc,adh,mg);
    wrap.appendChild(adc);
  });
  return wrap;
}

function modalDaireAySecim(bina,daire,yil){
  modal('\uD83D\uDCC5 '+daire.no+' \u2014 Ay Se\u00e7',function(m,close){
    const aidatlar=((D.aidatlar[bina.id]||{})[daire.id]||{})[yil]||{};
    const secili=S.seciliDaireler[daire.id]||[];
    const ylNow=simdiYil(),ayNow=simdiAy();
    let yeniSecim=[...secili];
    m.appendChild(dv('al al-info','\u00d6demesi beklenen aylar\u0131 se\u00e7in'));
    const mg=dv('mg');mg.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0';
    AY.forEach(function(ay,mi){
      const p=aidatlar[mi];
      const gecmis=yil<ylNow||(yil===ylNow&&mi<=ayNow);
      const odendi=p&&(p.durum==='odendi'||p.durum==='erken');
      const secilik=yeniSecim.indexOf(mi)>=0;
      const cell=dv('');cell.style.cssText='padding:10px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid '+(secilik?'#1a5c38':odendi?'#a5d6a7':'var(--border)')+';background:'+(secilik?'#e8f5e9':odendi?'#f1f8f1':'#fff')+';font-size:12px;font-weight:700';
      cell.innerHTML=(odendi?'\u2705 ':secilik?'\u25c9 ':'\u25cb ')+AYF[mi];
      if(!odendi&&gecmis){
        cell.onclick=function(){
          var idx2=yeniSecim.indexOf(mi);
          if(idx2>=0)yeniSecim.splice(idx2,1);
          else yeniSecim.push(mi);
          S.seciliDaireler[daire.id]=yeniSecim;
          close();modalDaireAySecim(bina,daire,yil);
        };
      } else {
        cell.style.cursor='default';cell.style.opacity='0.6';
      }
      mg.appendChild(cell);
    });
    m.appendChild(mg);
    const brow=dv('brow');
    brow.appendChild(btn('btn bgr','Kapat',close));
    brow.appendChild(btn('btn bg','\u2705 Se\u00e7imi Onayla',function(){
      S.seciliDaireler[daire.id]=yeniSecim;
      close();render();
    }));
    m.appendChild(brow);
  });
}

function modalAyOdeme(bina,daire,ay,yil,mevcut){

    append(m,fg('\u00d6DEME TAR\u0130H\u0130',tarI),fg('NOT',notI));
    const brow=dv('brow');
    brow.appendChild(btn('btn bgr','\u0130ptal',close));
    if(mevcut&&mevcut.durum==='odendi'){
      brow.appendChild(btn('btn br','\u274C \u0130ptal Et',function(){
        onayModal('\u00d6deme iptal edilsin mi?',function(){
          guncelle(function(){
            if(!D.aidatlar[bina.id])D.aidatlar[bina.id]={};

              D.kasaH[bina.id]=D.kasaH[bina.id].filter(function(h){
                return !(h.tip==='gelir'&&h.kategori==='Aidat Tahsilat\u0131'&&
                  h.aciklama&&h.aciklama.indexOf(daire.no)>=0&&
                  h.aciklama.indexOf(AYF[ay])>=0);
              });
            }
          },'Aidat iptal: '+daire.no+' '+AYF[ay]+' '+yil);
          close();toast('\u274C \u00d6deme iptal edildi','err');
        });

        onayModal(daire.no+' '+AYF[ay]+' aidat\u0131 \u00f6dendi i\u015faretlensin mi?',function(){

            D.aidatlar[bina.id][daire.id][yil][ay]={durum:'odendi',tutar:daire.aidat,tarih:tarI.value,not:notI.value};
            if(!D.kasaH[bina.id])D.kasaH[bina.id]=[];

            if(daire.aidat>0){
              D.kasaH[bina.id].push({id:uid(),tip:'gelir',tutar:daire.aidat,kategori:'Aidat Tahsilat\u0131',aciklama:daire.no+' \u2014 '+AYF[ay]+' '+yil,tarih:tarI.value,saat:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})});

          close();toast('\u2705 \u00d6dendi i\u015faretlendi','ok');

    }

function renderOylama(bina){
  var wrap=dv('');
  wrap.appendChild(dv('stit','\uD83D\uDDF3\uFE0F Oylama Y\u00f6netimi'));
  var oylamalar=(D.oylamalar||{})[bina.id]||[];
  var simdi=Date.now();

  if(!oylamalar.length){
    wrap.appendChild(dv('empty','<div class="ei">\uD83D\uDDF3\uFE0F</div><h3>Oylama yok</h3><p>+ butonundan yeni oylama ba\u015flat\u0131n</p>'));
    return wrap;
  }

  oylamalar.forEach(function(o,oi){
    var bitis=new Date(o.bitisTarih+'T'+o.bitisSaat).getTime();
    var bitti=simdi>bitis;
    var daireler=D.daireler[bina.id]||[];
    var toplam=daireler.length;

    // Süre dolunca otomatik onay uygula
    if(bitti&&!o.sonuclandı){
      o.sonuclandi=true;
      daireler.forEach(function(d){
        if(!o.oylar)o.oylar={};
        if(!o.oylar[d.id]){
          o.oylar[d.id]={oy:'otomatik',zaman:o.bitisTarih+'T'+o.bitisSaat,daireNo:d.no,sakin:d.sakin||''};
        }
      });
      guncelle(function(){
        D.oylamalar[bina.id][oi]=o;
      },'Oylama otomatik sonuçlandı: '+o.konu);
    }

    var oylar=o.oylar||{};
    var evetSayi=Object.values(oylar).filter(function(x){return x.oy==='evet';}).length;
    var hayirSayi=Object.values(oylar).filter(function(x){return x.oy==='hayir';}).length;
    var otomatikSayi=Object.values(oylar).filter(function(x){return x.oy==='otomatik';}).length;
    var bekleyenSayi=toplam-Object.keys(oylar).length;
    var katilimPct=toplam>0?Math.round(Object.keys(oylar).length/toplam*100):0;
    var evetPct=toplam>0?Math.round(evetSayi/toplam*100):0;
    var hayirPct=toplam>0?Math.round(hayirSayi/toplam*100):0;
    var bekleyenPct=toplam>0?Math.round((bekleyenSayi+otomatikSayi)/toplam*100):0;

    // Kalan süre
    var kalanMs=bitis-simdi;
    var kalanStr='';
    if(bitti){kalanStr='\uD83C\uDFC1 Sona erdi';}
    else{var g=Math.floor(kalanMs/86400000);var s=Math.floor((kalanMs%86400000)/3600000);kalanStr=(g>0?g+' g\u00fcn ':'')+s+' saat kald\u0131';}

    // Karar
    var kabul=evetSayi+otomatikSayi>toplam/2;
    var kararStr=bitti?(kabul?'\u2705 KABUL ED\u0130LD\u0130':'\u274C REDDEDILD\u0130'):'';

    var kart=dv('');kart.style.cssText='background:#fff;border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)';

    // Header
    var hdr=dv('');hdr.style.cssText='background:'+(bitti?'#2c3e50':'#1a5c38')+';padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start';
    var hdrL=dv('');hdrL.innerHTML='<div style="color:#fff;font-size:15px;font-weight:800">\uD83D\uDDF3\uFE0F '+o.konu+'</div>';
    var hdrR=dv('');hdrR.style.cssText='background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:11px;color:#fff;white-space:nowrap;flex-shrink:0;margin-left:8px';
    hdrR.textContent=bitti?kararStr:kalanStr;
    hdr.appendChild(hdrL);hdr.appendChild(hdrR);

    // Bitis bar
    var bb=dv('');bb.style.cssText='background:#e8f5e9;padding:8px 16px;display:flex;justify-content:space-between;font-size:11px';
    bb.innerHTML='<span style="color:#1a5c38;font-weight:700">\uD83D\uDCC5 Son: '+new Date(bitis).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'})+', '+o.bitisSaat+'</span>'
      +'<span style="color:#888">Ba\u015flang\u0131\u00e7: '+fT(o.baslangic)+'</span>';

    // Özet
    var ozet=dv('');ozet.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #f0f0f0';
    [{sayi:evetSayi,etiket:'\u2705 EVET',renk:'#2e7d32',bg:'#f1f8f1'},{sayi:hayirSayi,etiket:'\u274C HAYIR',renk:'#c62828',bg:'#fff5f5'},{sayi:bekleyenSayi,etiket:'\u23F3 BEKLEYEN',renk:'#f57c00',bg:'#fffbf0'}].forEach(function(item){
      var s=dv('');s.style.cssText='padding:12px;text-align:center;border-right:1px solid #f0f0f0;background:'+item.bg;
      s.innerHTML='<div style="font-size:22px;font-weight:900;color:'+item.renk+'">'+item.sayi+'</div><div style="font-size:10px;color:#888;font-weight:700;margin-top:2px">'+item.etiket+'</div>';
      ozet.appendChild(s);
    });

    // Progress
    var pw=dv('');pw.style.cssText='padding:12px 16px;border-bottom:1px solid #f0f0f0';
    pw.innerHTML='<div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:6px"><span>Kat\u0131l\u0131m: %'+katilimPct+'</span><span>%'+evetPct+' EVET</span></div>';
    var pb=dv('');pb.style.cssText='height:8px;background:#f0f0f0;border-radius:10px;overflow:hidden;display:flex';
    pb.innerHTML='<div style="width:'+evetPct+'%;background:#2e7d32;height:100%"></div>'
      +'<div style="width:'+hayirPct+'%;background:#c62828;height:100%"></div>'
      +'<div style="width:'+bekleyenPct+'%;background:#f0c040;height:100%"></div>';
    pw.appendChild(pb);

    // Daire listesi
    var dl=dv('');dl.style.cssText='padding:10px 16px;max-height:200px;overflow-y:auto';
    var dlT=dv('');dlT.style.cssText='font-size:11px;font-weight:700;color:#888;margin-bottom:8px';
    dlT.textContent='DA\u0130RE BAZLI OY DURUMU';
    dl.appendChild(dlT);
    daireler.forEach(function(d){
      var oy=oylar[d.id];
      var oyStr,oyRenk,oyBg;
      if(!oy){oyStr='\u23F3 Bekliyor';oyRenk='#888';oyBg='#f5f5f5';}
      else if(oy.oy==='evet'){oyStr='\u2705 Evet';oyRenk='#2e7d32';oyBg='#e8f5e9';}
      else if(oy.oy==='hayir'){oyStr='\u274C Hay\u0131r';oyRenk='#c62828';oyBg='#fce4ec';}
      else{oyStr='\uD83D\uDD04 Otomatik';oyRenk='#f57c00';oyBg='#fff8e1';}
      var row=dv('');row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px';
      row.innerHTML='<span>\uD83C\uDFE0 '+d.no+(d.sakin?' \u2014 '+d.sakin:'')+'</span>'
        +'<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:'+oyBg+';color:'+oyRenk+'">'+oyStr+'</span>';
      dl.appendChild(row);
    });

    // Otomatik onay yasal notu (bittiyse)
    if(bitti&&otomatikSayi>0){
      var yasal=dv('');yasal.style.cssText='padding:10px 16px;background:#fff8e1;font-size:11px;color:#92700a';
      yasal.innerHTML='\u2696\uFE0F '+otomatikSayi+' daire s\u00fcre i\u00e7inde oy kullanmad\u0131\u011f\u0131ndan sistem taraf\u0131ndan <b>\u00e7ekimser</b> say\u0131lm\u0131\u015ft\u0131r. 634 say\u0131l\u0131 KMK md.29 uyar\u0131nca karara kat\u0131lm\u0131\u015f kabul edilir.';
      kart.appendChild(yasal);
    }

    // Sil butonu
    var silBtn=btn('btn br bsm','\uD83D\uDDD1\uFE0F Oylamay\u0131 Sil',function(){
      if(confirm(o.konu+' silinsin mi?')){
        guncelle(function(){D.oylamalar[bina.id]=D.oylamalar[bina.id].filter(function(x){return x.id!==o.id;});},'Oylama silindi: '+o.konu);
      }
    });
    silBtn.style.cssText='margin:10px 16px;font-size:11px;padding:6px 12px';

    append(kart,hdr,bb,ozet,pw,dl,silBtn);
    wrap.appendChild(kart);
  });
  return wrap;
}

            onayModal(daire.no+' '+AYF[kayitAy2.ay]+' '+kayitAy2.yil+' \u00f6dendi i\u015faretlensin mi?',function(){

function modalTopluMakbuz(bina,yil){
  const h=D.kasaH[bina.id]||[];
  // Aidat ödemelerini bul - kategori farklı yazılmış olabilir, geniş filtre kullan
  const aidatH=h.filter(function(hm){
    if(hm.tip!=='gelir')return false;
    const kat=(hm.kategori||'').toLowerCase();
    return kat.includes('aidat')||kat.includes('tahsilat');
  });
  // Aynı ayda birden fazla ödeme yapan daireleri bul
  const gruplar={};
  aidatH.forEach(function(hm){
    const ay=hm.tarih?hm.tarih.substring(0,7):'';
    // Daire no'yu aciklama'dan çıkar
    let no='';
    if(hm.aciklama){
      const parca=hm.aciklama.split('\u2014');
      no=parca[0].trim();
    }
    if(!ay||!no)return;
    const key=ay+'_'+no;
    if(!gruplar[key])gruplar[key]=[];
    gruplar[key].push(hm);
  });
  const coklu=Object.entries(gruplar).filter(function(e){return e[1].length>1;});
  // Eğer çoklu yoksa tüm aidatları göster seçim için
  const gosterilecek=coklu.length>0?coklu:Object.entries(gruplar);
  modal('\uD83D\uDDB8\uFE0F Toplu Makbuz',function(m,close){
    if(!gosterilecek.length){m.appendChild(alrt('al-info','Hen\u00fcz aidat \u00f6demesi kaydedilmemi\u015f.'));m.appendChild(btn('btn bgr','Kapat',close));return;}
    if(coklu.length>0)m.appendChild(alrt('al-info',coklu.length+' daire ayn\u0131 ay i\u00e7inde birden fazla \u00f6deme yapm\u0131\u015f.'));
    else m.appendChild(alrt('al-info',gosterilecek.length+' aidat \u00f6demesi bulundu.'));
    m.appendChild(alrt('al-info',coklu.length+' kay\u0131t bulundu. Birden fazla \u00f6deme yapan daireler:'));
    const secimler={};
    coklu.forEach(function(entry){secimler[entry[0]]=true;});
    gosterilecek.forEach(function(entry){
      const key=entry[0],hList=entry[1];
      const parts=key.split('_');const ayStr=parts[0];const daireNo=parts.slice(1).join('_');
      const toplam=hList.reduce(function(s,x){return s+x.tutar;},0);
      const card=dv('card');card.style.cssText='margin-bottom:8px;border:2px solid var(--g1)';
      card.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:13px;font-weight:700">\uD83C\uDFE0 '+daireNo+' \u2014 '+ayStr+'</div><div style="font-size:11px;color:var(--text2);margin-top:3px">'+hList.length+' \u00f6deme \u00b7 Toplam: '+fP(toplam)+'</div></div></div>';
      m.appendChild(card);
    });
    const brow=dv('brow');
    brow.appendChild(btn('btn bgr','\u0130ptal',close));
    brow.appendChild(btn('btn bg','\uD83D\uDDB8\uFE0F T\u00fcm\u00fcn\u00fc Yazd\u0131r',function(){
      const allH=gosterilecek.reduce(function(acc,e){return acc.concat(e[1]);});
      close();
      if(!allH.length){toast('Hareket yok','warn');return;}
      toast('\uD83D\uDDB8\uFE0F '+allH.length+' makbuz haz\u0131rlan\u0131yor...','ok');
      allH.forEach(function(hm,i){setTimeout(function(){var daire=(D.daireler[bina.id]||[]).find(function(d){return hm.aciklama&&hm.aciklama.indexOf(d.no)>=0;});modalMakbuz(hm,bina,daire);},i*800);});
    }));
    m.appendChild(brow);
  });
}

function borcWAMesaj(bina, d, aidatBorc, kampanyaBorc, kampanyaDetay){
  var toplamBorc = aidatBorc + kampanyaBorc;
  var satirlar = [];
  satirlar.push('Sayın '+(d.sakin||d.no)+',');
  satirlar.push('');
  satirlar.push('🏢 *'+bina.ad+'* - '+d.no+' numaralı dairenize ait borç özeti:');
  satirlar.push('─────────────────');
  if(aidatBorc > 0) satirlar.push('💰 Aidat Borcu: *'+fP(aidatBorc)+'*');
  (kampanyaDetay||[]).forEach(function(kd){
    satirlar.push('🏗️ '+kd.ad+': *'+fP(kd.tutar)+'*');
  });
  satirlar.push('─────────────────');
  satirlar.push('💳 *TOPLAM: '+fP(toplamBorc)+'*');
  satirlar.push('');
  satirlar.push('Lütfen ödemenizi en kısa sürede yapınız.');
  satirlar.push('Dekontunuzu uygulama üzerinden yükleyebilirsiniz. 🙏');
  return satirlar.join('\n');
}

// ── AYLIK OTOMATİK HATIRLATMA ──
function aylikHatirlatmaKontrol(bina){
  if(!window.db)return;
  var simdi = new Date();
  var gun = simdi.getDate();
  var ay = simdi.getMonth();
  var yil = simdi.getFullYear();
  var hatKey = 'hatirlatma_'+bina.id+'_'+yil+'_'+ay;
  if(D.hatirlatmaLog&&D.hatirlatmaLog[hatKey])return; // Bu ay zaten gönderildi
  if(gun > 5)return; // Sadece ayın 1-5'i arasında
  // Borçlu var mı kontrol
  var daireler = D.daireler[bina.id]||[];
  var borcluSayi = 0;
  var kampanyalar = D.kampanyalar[bina.id]||[];
  var aidatlar = D.aidatlar[bina.id]||{};
  daireler.forEach(function(d){
    if(d.muaf)return;
    var borc=0;
    var yilAidat=(aidatlar[d.id]||{})[yil]||{};
    for(var m=0;m<=ay;m++){var p=yilAidat[m];if(!p||(p.durum!=='odendi'&&p.durum!=='erken'))borc+=d.aidat;}
    var kBorc=0;
    kampanyalar.forEach(function(k){var dk=k.daireler.filter(function(x){return x.daireId===d.id&&!x.odendi;});kBorc+=dk.length*(k.daireBasiTutar||0);});
    if(borc>0||kBorc>0)borcluSayi++;
  });
  if(!borcluSayi)return;
  // Modal göster
  setTimeout(function(){
    modal('\uD83D\uDCF2 Ayl\u0131k Otomatik Hat\u0131rlatma',function(m,close){
      m.appendChild(dv('al al-warn',
        simdi.toLocaleDateString('tr-TR',{month:'long'})+' ay\u0131 hat\u0131rlatmas\u0131 hen\u00fcz g\u00f6nderilmedi!\n\n'
        +borcluSayi+' borçlu daireye Mail + WhatsApp g\u00f6nderilsin mi?'));
      var brow=dv('brow');
      brow.appendChild(btn('btn bgr','Sonra',close));
      brow.appendChild(btn('btn bg','\uD83D\uDCE7 G\u00f6nder',function(){
        close();
        topluHatirlatmaGonder(bina);
        // Kaydı al - bu ay tekrar sorma
        if(!D.hatirlatmaLog)D.hatirlatmaLog={};
        D.hatirlatmaLog[hatKey]=new Date().toISOString();
        kaydet();
        toast('\uD83D\uDCE7 Ayl\u0131k hat\u0131rlatmalar g\u00f6nderiliyor...','ok');
      }));
      m.appendChild(brow);
    });
  }, 2000);
}

function topluHatirlatmaGonder(bina){
  var daireler=(D.daireler[bina.id]||[]);
  var kampanyalar=D.kampanyalar[bina.id]||[];
  var aidatlar=D.aidatlar[bina.id]||{};
  var ylNow=simdiYil(),ayNow=simdiAy();
  var gonderilen=0;
  daireler.forEach(function(d){
    if(d.muaf)return;
    var aidatBorc=0;
    var yilAidat=(aidatlar[d.id]||{})[ylNow]||{};
    for(var m=0;m<=ayNow;m++){var p=yilAidat[m];if(!p||(p.durum!=='odendi'&&p.durum!=='erken'))aidatBorc+=d.aidat;}
    var kampanyaBorc=0,kampanyaDetay=[];
    kampanyalar.forEach(function(k){
      var dk=k.daireler.filter(function(x){return x.daireId===d.id&&!x.odendi;});
      if(dk.length>0){var kt=dk.length*(k.daireBasiTutar||0);kampanyaBorc+=kt;kampanyaDetay.push({ad:k.ad,tutar:kt});}
    });
    if(aidatBorc===0&&kampanyaBorc===0)return;
    // Mail gönder
    if(d.sakinEmail){
      var htmlBody=borcMailHTML(bina,d,aidatBorc,kampanyaBorc,kampanyaDetay);
      mailGonder(d.sakinEmail,d.sakin||d.no,
        '\uD83D\uDCB0 '+bina.ad+' - Borç Hatırlatması',
        htmlBody, bina.ad);
      gonderilen++;
    }
    // WhatsApp gönder
    if(d.sakinTel){
      var tel=(d.sakinTel||'').replace(/[^0-9]/g,'');
      if(tel.startsWith('0'))tel='90'+tel.slice(1);
      var waMesaj=borcWAMesaj(bina,d,aidatBorc,kampanyaBorc,kampanyaDetay);
      setTimeout(function(){
        window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(waMesaj),'_blank');
      }, gonderilen*1500);
      gonderilen++;
    }
  });
  toast('\uD83D\uDCE7 '+gonderilen+' bildirim g\u00f6nderildi','ok');
}

    +(duyuru.tarih?'<div style="font-size:12px;color:#888;margin-bottom:16px">\uD83D\uDCC5 Tarih: '+fT(duyuru.tarih)+'</div>':'')
    +'<div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:12px 16px;font-size:12px;color:#2e7d32;margin-bottom:20px">'
    +'\uD83C\uDFE0 Bu duyuru BinaPlus uygulamas\u0131ndan g\u00f6r\u00fcnt\u00fclenebilir.</div>'
    +'<div style="font-size:11px;color:#999;border-top:1px solid #eee;padding-top:16px">'
    +'Bu mail BinaPlus Apartman Y\u00f6netim Sistemi taraf\u0131ndan otomatik g\u00f6nderilmi\u015ftir.<br>'
    +'Tarih: '+tarih+' \u00b7 '+bina.ad+'</div>'
    +'</div></div></body></html>';
}

function duyuruWAMesaj(bina, duyuru){
  var onem = duyuru.onem||'normal';
  var onemIkon = onem==='acil'?'\uD83D\uDEA8 *ACİL DUYURU*':onem==='onemli'?'\u26A0\uFE0F *ÖNEMLİ DUYURU*':'\uD83D\uDCE2 *DUYURU*';
  var satirlar = [];
  satirlar.push(onemIkon);
  satirlar.push('🏢 *'+bina.ad+'*');
  satirlar.push('─────────────────');
  satirlar.push('*'+duyuru.baslik+'*');
  satirlar.push('');
  satirlar.push(duyuru.icerik);
  if(duyuru.tarih){satirlar.push('');satirlar.push('📅 Tarih: '+fT(duyuru.tarih));}
  satirlar.push('─────────────────');
  satirlar.push('BinaPlus Apartman Yönetim Sistemi');
  return satirlar.join('\n');
}

// ── GÜNLÜK OTOMATİK BULUT YEDEĞİ (5 ay saklanır) ──
function gunlukYedekAl(){
  if(!window.db)return;
  var bugunKey='yedek_'+new Date().toISOString().slice(0,10);
  var col=window.db.collection('yedekler');
  col.doc(bugunKey).get().then(function(snap){
    if(snap&&snap.exists)return; // bugünün yedeği zaten var
    // Yedeği BULUTTAKİ veriden al (local değil) - en güvenlisi
    window.db.collection('binaplus').doc('data').get().then(function(s){
      if(s&&s.exists&&s.data()&&s.data().json){
        col.doc(bugunKey).set({
          json:s.data().json,
          tarih:new Date().toISOString()
        }).then(function(){
          console.log('G\u00fcnl\u00fck yedek al\u0131nd\u0131:',bugunKey);
        }).catch(function(e){console.warn('Yedek hatasi:',e);});
      }
    }).catch(function(){});
  }).catch(function(){});
}

// ── PWA SERVICE WORKER ───────────────────────────
// SW'yi kaldır - cache sorunlarını önle
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){r.unregister();console.log('SW kaldırıldı');});
  });
  // Cache'i temizle
  if(window.caches){
    caches.keys().then(function(names){
      names.forEach(function(n){caches.delete(n);});
    });
  }
}

// Push notification izni iste
async function pushIzniAl(){
  // iOS Safari'de Notification farklı çalışır
  if(!('Notification' in window)){console.log('Bildirim desteklenmiyor');return false;}
  if(Notification.permission==='granted')return true;
  if(Notification.permission==='denied')return false;
  try{
    const izin=await Notification.requestPermission();
    return izin==='granted';
  }catch(e){return false;}
}

// Lokal bildirim gönder (uygulama açıkken)
function lokalBildirim(baslik,mesaj,icon){
  if(Notification.permission==='granted'){
    new Notification(baslik,{
      body:mesaj,
      icon:icon||'icon-192.png',
      badge:'icon-192.png'
    });
  }
}

// ── PWA SERVICE WORKER ──────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      console.log('SW kayitli:',reg.scope);
      window._swReg=reg;
    }).catch(function(e){console.warn('SW hatasi:',e);});
  });
}

// PWA Yükleme butonu
var _pwaPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  _pwaPrompt=e;
  // Giriş ekranında yükle butonu göster
  var pwaBtn=document.getElementById('pwa-install-btn');
  if(pwaBtn)pwaBtn.style.display='block';
  console.log('PWA kurulum hazir!');
});
window.addEventListener('appinstalled',function(){
  console.log('PWA kuruldu!');
  _pwaPrompt=null;
  var pwaBtn=document.getElementById('pwa-install-btn');
  if(pwaBtn)pwaBtn.style.display='none';
});
function pwaCur(){
  if(_pwaPrompt){
    _pwaPrompt.prompt();
    _pwaPrompt.userChoice.then(function(r){
      console.log('PWA secim:',r.outcome);
      _pwaPrompt=null;
    });
  }
}

// ── BAŞLAT ───────────────────────────────────────
window.addEventListener('load', function(){
  migrateData();
  render(); // Önce local veriyle hemen göster
  window._appReady=true;
  // Firebase zaten yüklendiyse Firestore'u başlat, yoksa bekle
  if(window._firebaseLoaded||window.firebaseReady){
    firestoreBaslat();
  } else {
    // Firebase yüklenene kadar bekle
    var checkFb=setInterval(function(){
      if(window.firebaseReady){
        clearInterval(checkFb);
        firestoreBaslat();
      }
    },200);
    setTimeout(function(){clearInterval(checkFb);},10000);
  }
  setTimeout(function(){pushIzniAl();},3000);
});
</script>
