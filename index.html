<script>
// ── VERİ ─────────────────────────────────────────
const AY=['Oca','\u015eub','Mar','Nis','May','Haz','Tem','A\u011fu','Eyl','Eki','Kas','Ara'];
const AYF=['Ocak','\u015eubat','Mart','Nisan','May\u0131s','Haziran','Temmuz','A\u011fustos','Eyl\u00fcl','Ekim','Kas\u0131m','Aral\u0131k'];
const fP=n=>new Intl.NumberFormat('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:2}).format(n||0)+'\u20ba';
const fT=d=>d?new Date(d).toLocaleDateString('tr-TR'):'-';
const bugun=()=>new Date().toISOString().split('T')[0];
const uid=()=>'_'+Math.random().toString(36).slice(2,9);
const simdiAy=()=>new Date().getMonth();
const simdiYil=()=>new Date().getFullYear();

const INIT={
  admin:{email:'abdulkadiry06@hotmail.com',kullaniciAdi:'abdulkadiry06@hotmail.com',password:'123456',name:'Sistem Y\u00f6neticisi'},
  binalar:[{id:'b1',ad:'Lale Apartman\u0131',adres:'Atat\u00fcrk Cad. No:12, Kad\u0131k\u00f6y',yoneticiId:'y1',aylikAidat:500,baslangicYili:2024,askida:false,bitis:'2027-12-31'}],
  yoneticiler:[{id:'y1',ad:'Ahmet Y\u0131lmaz',kullaniciAdi:'ahmet',email:'ahmet@binaplus.com',password:'123456',binaId:'b1',askida:false,bitis:'2027-12-31',gSoru:'',gCevap:'',onaylandi:true,abonelik:'tam',abonelikBitis:''}],
  basvurular:[],
  daireler:{b1:[
    {id:'d1',no:'D1',kat:1,sakin:'Mehmet Demir',tip:'Kirac\u0131',aidat:250,muaf:false,sakinKA:'mehmet',sakinSifre:'123456'}
  ]},
  duyurular:{b1:[]},
  arizalar:{b1:[]},
  dekontlar:{b1:[]},
  aidatlar:{b1:{}},
  kasaH:{b1:[]},
  faturalar:{b1:[]},
  kampanyalar:{b1:[]},
  evraklar:{b1:[]},
  ayarlar:{b1:{kasaBas:0}},
};

let D,S={user:null,sekme:'kasa',yil:simdiYil(),adminSekme:'ozet'};
(function(){
  try{const s=localStorage.getItem('bp5');D=s?JSON.parse(s):JSON.parse(JSON.stringify(INIT));}
  catch(e){D=JSON.parse(JSON.stringify(INIT));}
  // migrate
  if(!D.kasaH&&D.kasaHareketleri){D.kasaH=D.kasaHareketleri;}
  if(!D.kasaH){D.kasaH={};}
  D.binalar.forEach(function(b){
    if(!D.daireler[b.id])D.daireler[b.id]=[];
    if(!D.aidatlar[b.id])D.aidatlar[b.id]={};
    if(!D.kasaH[b.id])D.kasaH[b.id]=[];
    if(!D.faturalar[b.id])D.faturalar[b.id]=[];
    if(!D.kampanyalar[b.id])D.kampanyalar[b.id]=[];
    if(!D.evraklar[b.id])D.evraklar[b.id]=[];
    if(!D.duyurular)D.duyurular={};
    if(!D.duyurular[b.id])D.duyurular[b.id]=[];
    if(!D.arizalar)D.arizalar={};
    if(!D.arizalar[b.id])D.arizalar[b.id]=[];
    if(!D.dekontlar)D.dekontlar={};
    if(!D.dekontlar[b.id])D.dekontlar[b.id]=[];
    if(!D.ayarlar)D.ayarlar={};
    if(!D.ayarlar[b.id])D.ayarlar[b.id]={kasaBas:0};
  });
  // Daireler için sakin giriş bilgisi migrate
  Object.keys(D.daireler).forEach(function(bid){
    (D.daireler[bid]||[]).forEach(function(d){
      if(!d.sakinKA)d.sakinKA='';
      if(!d.sakinSifre)d.sakinSifre='';
    });
  });
  D.yoneticiler.forEach(y=>{if(!y.gSoru)y.gSoru='';if(!y.gCevap)y.gCevap='';});
})();

const kaydet=async()=>{
  try{localStorage.setItem('bp5',JSON.stringify(D));}catch(e){}
  // Firestore'a da kaydet
  if(window.db&&window.fbStore){
    try{
      window._yaziyorum=true;
      await window.db.collection('binaplus').doc('data').set({
        json:JSON.stringify(D),
        guncelleme:new Date().toISOString()
      });
      setTimeout(function(){window._yaziyorum=false;},2000);
    }catch(e){console.warn('Firestore kayit hatasi:',e);}
  }
};
const guncelle=(fn)=>{fn();kaydet();render();};

// Firestore'dan veri yükle
async function firestoreYukle(){
  if(!window.db||!window.fbStore)return false;
  try{
    const ref=window.db.collection('binaplus').doc('data');
    const snap=await ref.get();
    if(snap&&snap.exists){
      const data=snap.data();
      if(data&&data.json){
        const uzak=JSON.parse(data.json);
        const lokalStr=localStorage.getItem('bp5');
        if(!lokalStr){
          D=uzak;localStorage.setItem('bp5',JSON.stringify(D));
          console.log('Firestore yuklendi');return true;
        }
        try{
          const lokal=JSON.parse(lokalStr);
          if(uzak.guncelleme&&lokal.guncelleme&&uzak.guncelleme>lokal.guncelleme){
            D=uzak;localStorage.setItem('bp5',JSON.stringify(D));
            console.log('Firestore guncel');return true;
          }
        }catch(e2){}
      }
    }
  }catch(e){console.warn('Firestore okuma hatasi:',e);}
  return false;
}

async function firestoreBaslat(){
  // Kısa süre bekle Firebase'in yüklenmesi için
  let deneme=0;
  while(!window.firebaseReady&&deneme<20){
    await new Promise(r=>setTimeout(r,200));
    deneme++;
  }
  if(!window.firebaseReady){
    console.warn('Firebase yüklenemedi, localStorage kullanılıyor');
    render();
    return;
  }
  const yuklendi=await firestoreYukle();
  if(yuklendi){
    migrateData();
    render(); // Firestore verisiyle güncelle
  }
  // Gerçek zamanlı dinleme - başka cihaz veri güncellerse otomatik yansısın
  if(window.db&&window.fbStore){
    window.db.collection('binaplus').doc('data').onSnapshot(function(snap){
      if(snap&&snap.exists&&!window._yaziyorum){
        try{
          const sd=snap.data();
          if(sd&&sd.json){
            const uzak=JSON.parse(sd.json);
            D=uzak;migrateData();
            localStorage.setItem('bp5',JSON.stringify(D));
            render();console.log('Firestore guncelleme alindi');
          }
        }catch(e){console.warn('Snap hatasi:',e);}
      }
    });
  }
}
function migrateData(){
  if(!D.kasaH&&D.kasaHareketleri){D.kasaH=D.kasaHareketleri;}
  if(!D.kasaH)D.kasaH={};
  D.binalar.forEach(function(b){
    if(!D.daireler[b.id])D.daireler[b.id]=[];
    if(!D.aidatlar[b.id])D.aidatlar[b.id]={};
    if(!D.kasaH[b.id])D.kasaH[b.id]=[];
    if(!D.faturalar[b.id])D.faturalar[b.id]=[];
    if(!D.kampanyalar[b.id])D.kampanyalar[b.id]=[];
    if(!D.evraklar[b.id])D.evraklar[b.id]=[];
    if(!D.duyurular)D.duyurular={};
    if(!D.duyurular[b.id])D.duyurular[b.id]=[];
    if(!D.arizalar)D.arizalar={};
    if(!D.arizalar[b.id])D.arizalar[b.id]=[];
    if(!D.dekontlar)D.dekontlar={};
    if(!D.dekontlar[b.id])D.dekontlar[b.id]=[];
    if(!D.ayarlar)D.ayarlar={};
    if(!D.ayarlar[b.id])D.ayarlar[b.id]={kasaBas:0};
  });
  D.yoneticiler.forEach(function(y){
    if(!y.gSoru)y.gSoru='';
    if(!y.gCevap)y.gCevap='';
    if(y.onaylandi===undefined)y.onaylandi=true;
    if(!y.kullaniciAdi)y.kullaniciAdi=y.email?y.email.split('@')[0]:'';
    if(!y.abonelik)y.abonelik='demo';
    if(y.abonelikBitis===undefined)y.abonelikBitis='';
  });
  Object.keys(D.daireler).forEach(function(bid){
    (D.daireler[bid]||[]).forEach(function(d){
      if(!d.sakinKA)d.sakinKA='';
      if(!d.sakinSifre)d.sakinSifre='';
    });
  });
  if(!D.basvurular)D.basvurular=[];
}

function renderSakin(bina){
  if(!S.sakinSekme)S.sakinSekme='aidat';

  const hdr=dv('hdr');

  const hl=dv('');hl.innerHTML='<div class="bina-nm">\uD83C\uDFE0 '+S.user.no+'</div><div class="bina-ad">'+bina.ad+'</div>';
  const hr2=dv('hdr-date');
  const now=new Date();
  const dtDiv=dv('dt',now.getDate()+' '+AYF[now.getMonth()]+'<br>'+now.getFullYear());
  const exitB=btn('exit-b','\uD83D\uDEF4 \u00c7\u0131k\u0131\u015f',function(){S.user=null;render();});
  hr2.appendChild(dtDiv);hr2.appendChild(exitB);
  htop.appendChild(hl);htop.appendChild(hr2);
  hdr.appendChild(htop);
  // Borç özeti kartı
  const daire=D.daireler[bina.id].find(function(x){return x.id===S.user.id;})||S.user;
  const aidatlar=(D.aidatlar[bina.id]||{})[daire.id]||{};
  const yilNow=simdiYil(),ayNow=simdiAy();
  let borc=0,odenenSayi=0,toplamAy=0;
  Object.keys(aidatlar).forEach(function(yil){
    const yilNum=+yil;
    const maxAy=yilNum<yilNow?11:(yilNum===yilNow?ayNow:-1);
    for(let m=0;m<=maxAy;m++){
      toplamAy++;
      const p=aidatlar[yil][m];
      if(p&&(p.durum==='odendi'||p.durum==='erken'))odenenSayi++;
      else if(!daire.muaf)borc+=daire.aidat;
    }
  });
  const kc=dv('kasa-c');
  kc.innerHTML='<div class="kasa-lbl">\uD83D\uDCB0 A\u0130DAT DURUMU</div><div class="kasa-amt" style="color:'+(borc>0?'#ffb3a7':'#a0e4b8')+'">'+(daire.muaf?'MUAF':fP(borc))+'</div><div class="kasa-sub">'+(daire.muaf?'Aidat muafiyetiniz var':borc>0?'Toplam bor\u00e7 tutar\u0131':'Bor\u00e7 yok, tebrikler!')+'</div>';
  hdr.appendChild(kc);
  const tabs=dv('tabs');
  [{k:'aidat',i:'\uD83D\uDCC5',l:'Aidat Durumum'},{k:'kampanya',i:'\uD83C\uDFD7\uFE0F',l:'Kampanyalar'},{k:'dekont',i:'\uD83E\uDDFE',l:'Dekont Y\u00fckle'},{k:'ariza',i:'\uD83D\uDD27',l:'Ar\u0131za Bildir'},{k:'duyurular',i:'\uD83D\uDCE2',l:'Duyurular'},{k:'giderler',i:'\uD83D\uDCCB',l:'Bina Giderleri'}].forEach(function(t){
    const tab=dv('tab'+(S.sakinSekme===t.k?' act':''),t.i+' '+t.l);
    tab.onclick=function(){S.sakinSekme=t.k;render();};
    tabs.appendChild(tab);
  });
  const cnt=dv('cnt');
  if(S.sakinSekme==='aidat')cnt.appendChild(renderSakinAidat(bina,daire));
  else if(S.sakinSekme==='kampanya')cnt.appendChild(renderSakinKampanya(bina,daire));
  else if(S.sakinSekme==='dekont')cnt.appendChild(renderSakinDekont(bina,daire));
  else if(S.sakinSekme==='ariza')cnt.appendChild(renderSakinAriza(bina,daire));
  else if(S.sakinSekme==='duyurular')cnt.appendChild(renderSakinDuyurular(bina));
  else if(S.sakinSekme==='giderler')cnt.appendChild(renderSakinGiderler(bina));
  const fab=el('button','fab','\uFF0B');

    if(S.sakinSekme==='dekont')modalDekontYukle(bina,daire);
    else if(S.sakinSekme==='ariza')modalArizaBildir(bina,daire);
  };
  if(S.sakinSekme==='dekont'||S.sakinSekme==='ariza')wrap.appendChild(fab);
  append(wrap,hdr,tabs,cnt);
  return wrap;
}

function renderAidat(bina){
  const wrap=dv('');

  const nt=btn('yn','\u203a',function(){S.yil++;render();});
  const ym=dv('');ym.style.textAlign='center';ym.innerHTML='<div class="yt">'+S.yil+'</div><div class="ys">'+(S.yil===simdiYil()?'G\u00fcncel Y\u0131l':'')+'</div>';
  yc.appendChild(pb);yc.appendChild(ym);yc.appendChild(nt);
  wrap.appendChild(yc);
  // Toplu makbuz butonu
  const tBtn=btn('','\uD83D\uDDB8\uFE0F Toplu Makbuz',function(){modalTopluMakbuz(bina,S.yil);});
  tBtn.style.cssText='width:100%;background:#fff;border:2px solid var(--g1);color:var(--g1);border-radius:11px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px';
  wrap.appendChild(tBtn);
  const leg=dv('leg');
  [['ok','\u2713','\u00d6dendi'],['no','\u2717','\u00d6denmedi'],['er','\u26A1','Erken'],['ft','\u00b7','Gelecek']].forEach(function(item){
    const li=dv('leg-i');
    const dot=dv('mc '+item[0]);dot.style.cssText='width:22px;height:22px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;font-size:11px;font-weight:800';
    dot.innerHTML='<span>'+item[1]+'</span>';
    li.appendChild(dot);li.appendChild(document.createTextNode(' '+item[2]));
    leg.appendChild(li);
  });
  wrap.appendChild(leg);
  const dl=D.daireler[bina.id]||[];
  if(!dl.length){wrap.appendChild(dv('empty','<div class="ei">\uD83C\uDFE0</div><h3>Daire yok</h3><p>Daireler sekmesinden ekleyin</p>'));return wrap;}
  const al=D.aidatlar[bina.id]||{};
  const ayNow=simdiAy(),ylNow=simdiYil();
  dl.forEach(function(d){
    const dy=(al[d.id]||{})[S.yil]||{};
    let odToplam=0,borcToplam=0;
    const ayMax=S.yil<ylNow?11:(S.yil===ylNow?ayNow:-1);
    for(let mm=0;mm<12;mm++){const p=dy[mm];if(p&&(p.durum==='odendi'||p.durum==='erken'))odToplam+=p.tutar||d.aidat;}
    if(!d.muaf)for(let mm=0;mm<=ayMax;mm++){const p=dy[mm];if(!p||p.durum==='odenmedi')borcToplam+=d.aidat;}
    const adc=dv('ad-c');
    const adh=dv('ad-h');
    const adn=dv('ad-n','\uD83C\uDFE0 '+d.no);
    let stHtml='';
    if(d.muaf)stHtml='<span style="color:var(--text2)">Muaf</span>';
    else if(borcToplam===0&&ayMax>=0)stHtml='<span style="color:var(--g1);font-weight:800">\u2713 Temiz</span>';
    else if(borcToplam>0)stHtml='<span style="color:var(--red);font-weight:800">'+fP(borcToplam)+'</span>';
    adh.appendChild(adn);adh.innerHTML+=stHtml;
    const sub=dv('',d.sakin||'\u2014');sub.style.cssText='font-size:12px;color:var(--text2);margin-bottom:8px';
    const mg=dv('mg');
    AY.forEach(function(ay,mi){
      const p=dy[mi];
      let cls='ft',ic='\u00b7';
      if(d.muaf){cls='mf';ic='-';}
      else if(p&&p.durum==='odendi'){cls='ok';ic='\u2713';}
      else if(p&&p.durum==='erken'){cls='er';ic='\u26A1';}
      else if(S.yil<ylNow||(S.yil===ylNow&&mi<=ayNow)){cls='no';ic='\u2717';}
      const cell=dv('mc '+cls);
      cell.innerHTML='<div class="mi">'+ic+'</div><div class="mn">'+ay+'</div>';
      if(!d.muaf){
        (function(month,curP){
          cell.onclick=function(){modalAyOdeme(bina,d,month,S.yil,curP);};
        })(mi,p);
      }
      mg.appendChild(cell);
    });
    append(adc,adh,sub,mg);
    wrap.appendChild(adc);
  });
  return wrap;
}
function modalAyOdeme(bina,daire,ay,yil,mevcut){

    const durumlar=[{k:'odendi',ic:'\u2713',l:'\u00d6dendi',cls:'ok'},{k:'erken',ic:'\u26A1',l:'Erken \u00d6deme',cls:'er'},{k:'odenmedi',ic:'\u2717',l:'\u00d6denmedi',cls:'no'},{k:'gelecek',ic:'\u00b7',l:'D\u00f6nem Gelmedi',cls:'ft'}];
    let secili=mevcut?mevcut.durum:'odenmedi';
    const tI=inp('number',mevcut?mevcut.tutar:daire.aidat,'');

      cell.style.cssText='padding:12px 8px;border-radius:12px;text-align:center;cursor:pointer;border-width:2.5px;font-size:13px'+(secili===dur.k?';box-shadow:0 0 0 3px #333':'');
      cell.innerHTML='<div class="mi" style="font-size:18px">'+dur.ic+'</div><div class="mn" style="font-size:12px;margin-top:4px">'+dur.l+'</div>';
      cell.onclick=function(){
        secili=dur.k;
        Object.keys(cells).forEach(function(k){cells[k].style.boxShadow='';});
        cell.style.boxShadow='0 0 0 3px #333';
      };
      cells[dur.k]=cell;
      grid.appendChild(cell);
    });
    append(m,grid,fg('TUTAR (\u20ba)',tI),fg('TAR\u0130H',dI));
    const brow=dv('brow');
    brow.appendChild(btn('btn bgr','\u0130ptal',close));
    brow.appendChild(btn('btn bg','\u2705 Kaydet',function(){
      const tutar=+tI.value||daire.aidat;
      const tarih=dI.value;
      guncelle(function(){
        if(!D.aidatlar[bina.id])D.aidatlar[bina.id]={};
        if(!D.aidatlar[bina.id][daire.id])D.aidatlar[bina.id][daire.id]={};
        if(!D.aidatlar[bina.id][daire.id][yil])D.aidatlar[bina.id][daire.id][yil]={};
        D.aidatlar[bina.id][daire.id][yil][ay]={durum:secili,tutar:tutar,tarih:tarih};
        if((secili==='odendi'||secili==='erken')&&(!mevcut||mevcut.durum==='odenmedi'||mevcut.durum==='gelecek')){
          if(!D.kasaH[bina.id])D.kasaH[bina.id]=[];
          D.kasaH[bina.id].push({id:uid(),tip:'gelir',tutar:tutar,kategori:'Aidat Tahsilat\u0131',aciklama:daire.no+' \u2014 '+(daire.sakin||'')+'  \u2014 '+AYF[ay],tarih:tarih,saat:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})});
        }
      });
      close();toast('\u2705 Kaydedildi','ok');
    }));
    m.appendChild(brow);
    if(mevcut&&(mevcut.durum==='odendi'||mevcut.durum==='erken')){
      const mkbBtn=btn('btn bout','\uD83D\uDDB8\uFE0F Makbuz',function(){
        const fh={tip:'gelir',tutar:mevcut.tutar||daire.aidat,kategori:'Aidat Tahsilat\u0131',aciklama:daire.no+' \u2014 '+(daire.sakin||'')+' \u2014 '+AYF[ay]+' '+yil,tarih:mevcut.tarih};
        modalMakbuz(fh,bina);

function modalKampanyaDaireEkle(bina,k){

    const dl=D.daireler[bina.id]||[];
    const mevcutIds=k.daireler.map(function(x){return x.daireId;});
    const boslar=dl.filter(function(d){return!mevcutIds.includes(d.id);});
    let secId='',secNo='',secSakin='';
    if(boslar.length){
      const opts=[['',' Binadan se\u00e7...']].concat(boslar.map(function(d){return[d.id,d.no+(d.sakin?' \u2014 '+d.sakin:'')];}));

        const sd=boslar.find(function(x){return x.id===secSel.value;});
        if(sd){secId=sd.id;noI.value=sd.no;skI.value=sd.sakin||'';}
      };

        const ki=D.kampanyalar[bina.id].find(function(x){return x.id===k.id;});

      close();toast('\u2705 Daire eklendi','ok');

    if(!ay||!no)return;
    const key=ay+'_'+no;
    if(!gruplar[key])gruplar[key]=[];
    gruplar[key].push(hm);
  });
  const coklu=Object.entries(gruplar).filter(function(e){return e[1].length>1;});
  // Eğer çoklu yoksa tüm aidatları göster seçim için
  const gosterilecek=coklu.length>0?coklu:Object.entries(gruplar);
  modal('\uD83D\uDDB8\uFE0F Toplu Makbuz',function(m,close){
    if(!gosterilecek.length){m.appendChild(alrt('al-info','Hen\u00fcz aidat \u00f6demesi kaydedilmemi\u015f.'));m.appendChild(btn('btn bgr','Kapat',close));return;}
    if(coklu.length>0)m.appendChild(alrt('al-info',coklu.length+' daire ayn\u0131 ay i\u00e7inde birden fazla \u00f6deme yapm\u0131\u015f.'));
    else m.appendChild(alrt('al-info',gosterilecek.length+' aidat \u00f6demesi bulundu.'));
    m.appendChild(alrt('al-info',coklu.length+' kay\u0131t bulundu. Birden fazla \u00f6deme yapan daireler:'));
    const secimler={};
    coklu.forEach(function(entry){secimler[entry[0]]=true;});
    gosterilecek.forEach(function(entry){
      const key=entry[0],hList=entry[1];
      const parts=key.split('_');const ayStr=parts[0];const daireNo=parts.slice(1).join('_');
      const toplam=hList.reduce(function(s,x){return s+x.tutar;},0);
      const card=dv('card');card.style.cssText='margin-bottom:8px;border:2px solid var(--g1)';
      card.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:13px;font-weight:700">\uD83C\uDFE0 '+daireNo+' \u2014 '+ayStr+'</div><div style="font-size:11px;color:var(--text2);margin-top:3px">'+hList.length+' \u00f6deme \u00b7 Toplam: '+fP(toplam)+'</div></div></div>';
      m.appendChild(card);
    });
    const brow=dv('brow');
    brow.appendChild(btn('btn bgr','\u0130ptal',close));
    brow.appendChild(btn('btn bg','\uD83D\uDDB8\uFE0F T\u00fcm\u00fcn\u00fc Yazd\u0131r',function(){
      const allH=gosterilecek.reduce(function(acc,e){return acc.concat(e[1]);});
      close();
      if(!allH.length){toast('Hareket yok','warn');return;}
      toast('\uD83D\uDDB8\uFE0F '+allH.length+' makbuz haz\u0131rlan\u0131yor...','ok');
      allH.forEach(function(hm,i){setTimeout(function(){modalMakbuz(hm,bina);},i*800);});
    }));
    m.appendChild(brow);
  });
}

// Push notification izni iste
async function pushIzniAl(){
  if(!('Notification' in window))return false;
  if(Notification.permission==='granted')return true;
  const izin=await Notification.requestPermission();
  return izin==='granted';
}

// Lokal bildirim gönder (uygulama açıkken)
function lokalBildirim(baslik,mesaj,icon){
  if(Notification.permission==='granted'){
    new Notification(baslik,{
      body:mesaj,
      icon:icon||'icon-192.png',
      badge:'icon-192.png'
    });
  }
}

window.addEventListener('load', function(){
  migrateData();
  render(); // Önce local veriyle hemen göster
  firestoreBaslat(); // Sonra Firestore'dan güncelle
  setTimeout(function(){pushIzniAl();},3000);
});
