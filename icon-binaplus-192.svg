<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#00796B"/>
    </linearGradient>
    <linearGradient id="binaOn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="binaYan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="binaUst" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#222"/>
    </linearGradient>
    <linearGradient id="cam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#004D40;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="altin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF176"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#F9A825"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,200,83,0.3)"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ag"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(255,215,0,0.5)"/></filter>
  </defs>

  <!-- Arka plan yuvarlak -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- Zemin yansıma -->
  <ellipse cx="96" cy="172" rx="60" ry="10" fill="rgba(0,200,83,0.1)"/>

  <!-- 3D Bina -->
  <!-- Yan yüz -->
  <polygon points="118,32 148,50 148,148 118,130" fill="url(#binaYan)"/>
  <!-- Ön yüz -->
  <polygon points="48,52 118,32 118,130 48,150" fill="url(#binaOn)"/>
  <!-- Üst yüz -->
  <polygon points="48,52 118,32 148,50 78,68" fill="url(#binaUst)"/>

  <!-- Ön pencereler -->
  <rect x="58" y="65" width="14" height="11" rx="1.5" fill="url(#cam)" filter="url(#glow)"/>
  <rect x="78" y="61" width="14" height="11" rx="1.5" fill="url(#cam)" opacity="0.5"/>
  <rect x="98" y="57" width="14" height="11" rx="1.5" fill="url(#cam)" filter="url(#glow)"/>
  <rect x="58" y="82" width="14" height="11" rx="1.5" fill="url(#cam)" opacity="0.5"/>
  <rect x="78" y="78" width="14" height="11" rx="1.5" fill="url(#cam)" filter="url(#glow)"/>
  <rect x="98" y="74" width="14" height="11" rx="1.5" fill="url(#cam)" opacity="0.7"/>
  <rect x="58" y="99" width="14" height="11" rx="1.5" fill="url(#cam)" filter="url(#glow)"/>
  <rect x="78" y="95" width="14" height="11" rx="1.5" fill="url(#cam)" opacity="0.4"/>
  <rect x="98" y="91" width="14" height="11" rx="1.5" fill="url(#cam)" filter="url(#glow)"/>
  <rect x="58" y="116" width="14" height="11" rx="1.5" fill="url(#cam)" opacity="0.6"/>
  <rect x="78" y="112" width="14" height="11" rx="1.5" fill="url(#cam)" filter="url(#glow)"/>
  <rect x="98" y="108" width="14" height="11" rx="1.5" fill="url(#cam)" opacity="0.5"/>

  <!-- Yan pencereler -->
  <rect x="122" y="58" width="20" height="9" rx="1" fill="url(#cam)" opacity="0.4"/>
  <rect x="122" y="74" width="20" height="9" rx="1" fill="url(#cam)" opacity="0.6"/>
  <rect x="122" y="90" width="20" height="9" rx="1" fill="url(#cam)" opacity="0.3"/>
  <rect x="122" y="106" width="20" height="9" rx="1" fill="url(#cam)" opacity="0.5"/>

  <!-- Kenar çizgileri -->
  <line x1="48" y1="52" x2="48" y2="150" stroke="rgba(0,200,83,0.15)" stroke-width="1.5"/>
  <line x1="118" y1="32" x2="118" y2="130" stroke="rgba(0,200,83,0.2)" stroke-width="1.5"/>
  <line x1="148" y1="50" x2="148" y2="148" stroke="rgba(0,200,83,0.1)" stroke-width="1.5"/>

  <!-- Zemin çizgisi -->
  <line x1="38" y1="158" x2="155" y2="148" stroke="rgba(0,200,83,0.3)" stroke-width="2"/>

  <!-- "BP" altın monogram sağ alt -->
  <text x="20" y="186" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="900" fill="url(#altin)" filter="url(#ag)" letter-spacing="-0.5">B+</text>

  <!-- Plus ikonu sağ üst -->
  <circle cx="164" cy="30" r="20" fill="url(#green)" filter="url(#sh)"/>
  <rect x="154" y="27" width="20" height="7" rx="3.5" fill="white"/>
  <rect x="160" y="21" width="7" height="20" rx="3.5" fill="white"/>
</svg>