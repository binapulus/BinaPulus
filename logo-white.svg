<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="goldGW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C040"/>
      <stop offset="100%" style="stop-color:#D4A843"/>
    </linearGradient>
    <linearGradient id="greenGW" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#52b788"/>
      <stop offset="100%" style="stop-color:#2D7A5A"/>
    </linearGradient>
  </defs>

  <!-- İkon — transparan arka plan, sadece bina -->
  <!-- Bina gövde -->
  <rect x="8" y="26" width="40" height="42" rx="2" fill="url(#greenGW)"/>
  <!-- Çatı -->
  <polygon points="28,8 4,28 52,28" fill="url(#goldGW)"/>
  <!-- Pencereler -->
  <rect x="12" y="32" width="9" height="8" rx="1" fill="rgba(0,0,0,0.4)"/>
  <rect x="35" y="32" width="9" height="8" rx="1" fill="rgba(0,0,0,0.4)"/>
  <rect x="12" y="45" width="9" height="8" rx="1" fill="rgba(0,0,0,0.4)"/>
  <rect x="35" y="45" width="9" height="8" rx="1" fill="rgba(0,0,0,0.4)"/>
  <!-- Kapı -->
  <rect x="21" y="50" width="14" height="18" rx="1.5" fill="rgba(0,0,0,0.45)"/>
  <!-- Plus rozeti -->
  <circle cx="51" cy="16" r="10" fill="url(#goldGW)"/>
  <rect x="46.5" y="14.5" width="9" height="3" rx="1.5" fill="#fff"/>
  <rect x="49.5" y="11.5" width="3" height="9" rx="1.5" fill="#fff"/>

  <!-- Yazı -->
  <text x="70" y="42"
        font-family="'Nunito','Segoe UI',sans-serif"
        font-size="30" font-weight="900" letter-spacing="-0.5"
        fill="#FFFFFF">Bina</text>
  <text x="138" y="42"
        font-family="'Nunito','Segoe UI',sans-serif"
        font-size="30" font-weight="900" letter-spacing="-0.5"
        fill="url(#goldGW)">Plus</text>
  <text x="70" y="59"
        font-family="'Nunito','Segoe UI',sans-serif"
        font-size="10" font-weight="700" letter-spacing="2.5"
        fill="#52b788" opacity="0.9">AKILLI BİNA YÖNETİMİ</text>
</svg>
